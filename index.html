<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0618">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ryze</title>
<link rel="apple-touch-icon" id="appleIcon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #07041a;
  --bg-2: #0f0a24;
  --bg-3: #15102e;
  --bg-4: #1c1538;
  --border: #2a2050;
  --text: #f5f3ff;
  --text-dim: #9b96c4;
  --text-faint: #5a5480;
  --accent-1: #ff5555;
  --accent-2: #5b8cff;
  --accent-3: #4ade80;
  --accent-4: #fbbf24;
  --brand: #7c4dff;
  --brand-2: #3b63ff;
  --warmup: #a78bfa;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body {
  background:
    radial-gradient(ellipse at 15% 0%, rgba(91, 77, 255, 0.25) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 30%, rgba(123, 77, 255, 0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(59, 99, 255, 0.12) 0%, transparent 60%),
    linear-gradient(180deg, #0a0620 0%, #07041a 50%, #0a0620 100%);
  background-attachment: fixed;
  padding-bottom: 120px;
}

.header {
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  background: rgba(10, 6, 32, 0.7);
  border-bottom: 1px solid rgba(124, 77, 255, 0.15);
  padding: 14px 14px 14px;
}
.logo-row { display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px; letter-spacing: 8px;
  background: linear-gradient(135deg, #a78bfa 0%, #7c4dff 50%, #5b8cff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; padding-left: 8px;
}
.counters { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.counter {
  background: linear-gradient(135deg, rgba(21, 16, 46, 0.8), rgba(15, 10, 36, 0.8));
  border: 1px solid rgba(124, 77, 255, 0.2);
  border-radius: 14px; padding: 7px 4px;
  text-align: center; position: relative; overflow: visible;
  backdrop-filter: blur(10px); min-width: 0;
}
.counter::before {
  content: ''; position: absolute; top: 0; left: 6px; right: 6px;
  height: 2px; background: var(--accent); border-radius: 0 0 2px 2px;
  box-shadow: 0 0 8px var(--accent);
}
.counter[data-day="1"] { --accent: var(--accent-1); }
.counter[data-day="2"] { --accent: var(--accent-2); }
.counter[data-day="3"] { --accent: var(--accent-3); }
.counter[data-day="4"] { --accent: var(--accent-4); }
.counter-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.counter-controls { display: flex; align-items: center; justify-content: center; gap: 4px; }
.counter-btn {
  width: 22px; height: 22px; border: 1px solid var(--border);
  background: var(--bg-3); color: var(--text); border-radius: 6px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.counter-btn:active { transform: scale(0.88); background: var(--accent); border-color: var(--accent); box-shadow: 0 0 16px var(--accent); }
.counter-value { font-family: 'Bebas Neue', sans-serif; font-size: 20px; min-width: 18px; color: var(--accent); display: inline-block; }
.counter-value.pop { animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes popIn {
  0% { transform: scale(1); }
  25% { transform: scale(1.9); filter: drop-shadow(0 0 14px var(--accent)); }
  60% { transform: scale(0.85); }
  100% { transform: scale(1); filter: none; }
}

.confetti { position: absolute; width: 7px; height: 7px; pointer-events: none; opacity: 0; border-radius: 50%; z-index: 1000; }
.confetti.star { border-radius: 0; width: 8px; height: 8px; }
.plus-one {
  position: absolute; top: -4px; left: 50%; transform: translateX(-50%);
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent);
  pointer-events: none; text-shadow: 0 0 18px var(--accent), 0 0 6px var(--accent);
  animation: flashUp 1s ease-out forwards; z-index: 10;
}
@keyframes flashUp {
  0% { opacity: 0; transform: translate(-50%, 10px) scale(0.5); }
  25% { opacity: 1; transform: translate(-50%, -4px) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -34px) scale(1.4); }
}

.days-container { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
.day {
  background: linear-gradient(135deg, rgba(21, 16, 46, 0.85), rgba(15, 10, 36, 0.9));
  border: 1px solid rgba(124, 77, 255, 0.15); border-radius: 22px;
  overflow: hidden; transition: all 0.3s; backdrop-filter: blur(10px);
}
.day[data-day="1"] { --accent: var(--accent-1); }
.day[data-day="2"] { --accent: var(--accent-2); }
.day[data-day="3"] { --accent: var(--accent-3); }
.day[data-day="4"] { --accent: var(--accent-4); }
.day.open { border-color: var(--accent); box-shadow: 0 0 50px -12px var(--accent), inset 0 1px 0 rgba(255,255,255,0.05); }
.day-header { padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; -webkit-user-select: none; position: relative; }
.day-header::before { content: ''; position: absolute; left: 0; top: 18px; bottom: 18px; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; box-shadow: 0 0 12px var(--accent); }
.day-title { display: flex; align-items: center; gap: 14px; }
.day-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); line-height: 0.85; letter-spacing: 2px; }
.day-info h2 { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 2px; }
.day-info p { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
.day-chevron { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
.day.open .day-chevron { background: var(--accent); border-color: var(--accent); transform: rotate(180deg); box-shadow: 0 0 16px var(--accent); }
.day-chevron svg { width: 14px; height: 14px; }
.day-body { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.day.open .day-body { max-height: 40000px; }
.day-body-inner { padding: 0 16px 20px; }

.day-toolbar { display: flex; gap: 8px; margin-bottom: 16px; padding: 12px; background: rgba(15, 10, 36, 0.6); border: 1px solid rgba(124, 77, 255, 0.1); border-radius: 14px; }
.toolbar-btn { flex: 1; padding: 10px; background: var(--bg-4); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
.toolbar-btn:active { transform: scale(0.97); }
.toolbar-btn.reset { color: #ff7a7a; }
.toolbar-btn.shuffle { color: var(--warmup); }
.toolbar-btn.progress { color: var(--accent); border-color: var(--accent); }

.progress-bar { height: 4px; background: rgba(15, 10, 36, 0.6); border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--brand)); transition: width 0.4s; border-radius: 2px; box-shadow: 0 0 10px var(--accent); }

.section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin: 18px 4px 10px; display: flex; align-items: center; gap: 8px; }
.section-title::before { content: ''; width: 14px; height: 2px; background: var(--accent); box-shadow: 0 0 8px var(--accent); }

.exercise { background: rgba(21, 16, 46, 0.7); border: 1px solid rgba(124, 77, 255, 0.12); border-radius: 16px; padding: 14px; margin-bottom: 10px; position: relative; transition: all 0.3s; }
.exercise.done { opacity: 0.38; background: rgba(15, 10, 36, 0.5); }
.exercise.done .ex-image-wrap { filter: grayscale(1); }
.ex-top { display: flex; gap: 12px; margin-bottom: 12px; }
.ex-image-wrap { width: 78px; height: 78px; background: linear-gradient(135deg, var(--bg-4), var(--bg-2)); border: 1px solid var(--accent); border-radius: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; box-shadow: inset 0 0 30px -10px var(--accent), 0 2px 12px rgba(0,0,0,0.4); }
.ex-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ex-emoji { font-size: 40px; line-height: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
.ex-header { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
.ex-num-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.ex-check { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 7px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: auto; transition: all 0.2s; flex-shrink: 0; }
.exercise.done .ex-check { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px var(--accent); }
.ex-check svg { width: 14px; height: 14px; opacity: 0; transition: opacity 0.2s; }
.exercise.done .ex-check svg { opacity: 1; }
.ex-name { font-size: 15px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
.ex-meta { display: flex; gap: 10px; flex-wrap: wrap; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; }
.ex-meta b { color: var(--text); font-weight: 600; }

.ex-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.ctrl-group { background: rgba(28, 21, 56, 0.7); border: 1px solid rgba(124, 77, 255, 0.12); border-radius: 10px; padding: 8px 10px; }
.ctrl-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.weight-input-wrap { display: flex; align-items: center; gap: 4px; }
.weight-input { flex: 1; background: transparent; border: none; color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; width: 100%; padding: 0; outline: none; min-width: 0; }
.weight-input:focus { color: var(--accent); }
.weight-unit { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); font-weight: 600; }
.feel-select { width: 100%; background: transparent; border: none; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 2px 0; outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; }
.feel-select option { background: var(--bg-3); }

/* COMMENT BOX */
.ex-comment { margin-bottom: 10px; }
.ex-comment-input {
  width: 100%; background: rgba(15, 10, 36, 0.6); border: 1px solid rgba(124, 77, 255, 0.1);
  border-radius: 10px; padding: 10px 12px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 12px; line-height: 1.4;
  outline: none; resize: none; min-height: 38px; max-height: 120px;
  transition: all 0.15s; font-weight: 500;
}
.ex-comment-input:focus { border-color: var(--accent); background: rgba(21, 16, 46, 0.9); }
.ex-comment-input::placeholder { color: var(--text-faint); font-style: italic; }

/* PROGRESSION CHART */
.ex-chart {
  margin-bottom: 10px; background: rgba(15, 10, 36, 0.5);
  border: 1px solid rgba(124, 77, 255, 0.12); border-radius: 10px;
  padding: 8px 10px; position: relative;
}
.ex-chart-label {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center;
}
.ex-chart-trend { font-size: 10px; font-weight: 700; font-family: 'Inter', sans-serif; }
.ex-chart-trend.up { color: #4ade80; }
.ex-chart-trend.down { color: #ff7a7a; }
.ex-chart-trend.same { color: var(--text-dim); }
.ex-chart svg { display: block; width: 100%; height: 50px; }
.ex-chart-empty { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faint); text-align: center; padding: 8px; font-style: italic; }

.timer-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, rgba(124, 77, 255, 0.15), rgba(91, 140, 255, 0.1)); border: 1px solid var(--border); color: var(--text); border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; }
.timer-btn:active { transform: scale(0.98); }
.timer-btn:hover { border-color: var(--accent); color: var(--accent); }
.timer-btn svg { width: 14px; height: 14px; }

.cardio { background: linear-gradient(135deg, rgba(167, 139, 250, 0.08), rgba(91, 140, 255, 0.05)); border: 1px dashed var(--warmup); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; }
.cardio.end { border-color: var(--accent); background: linear-gradient(135deg, rgba(124, 77, 255, 0.08), rgba(91, 140, 255, 0.05)); }
.cardio-icon { width: 50px; height: 50px; background: rgba(28, 21, 56, 0.8); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 26px; }
.cardio-info h4 { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; margin-bottom: 3px; }
.cardio-info p { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); line-height: 1.5; }

.timer-overlay { position: fixed; inset: 0; background: rgba(7, 4, 26, 0.97); backdrop-filter: blur(14px); z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 30px; }
.timer-overlay.active { display: flex; }
.timer-ring { width: 240px; height: 240px; position: relative; }
.timer-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.timer-ring circle { fill: none; stroke-width: 8; stroke-linecap: round; }
.timer-ring .bg-circle { stroke: var(--bg-3); }
.timer-ring .fg-circle { stroke: url(#grad); stroke-dasharray: 691; stroke-dashoffset: 0; transition: stroke-dashoffset 0.9s linear; }
.timer-time { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 2px; }
.timer-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; text-align: center; padding: 0 20px; }
.timer-actions { display: flex; gap: 12px; }
.timer-action { padding: 14px 28px; background: var(--bg-3); border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
.timer-action.stop { background: linear-gradient(135deg, var(--brand), var(--brand-2)); border-color: var(--brand); }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(21, 16, 46, 0.95); border: 1px solid var(--brand); color: var(--text); padding: 12px 20px; border-radius: 30px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; z-index: 500; opacity: 0; transition: all 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 30px rgba(124, 77, 255, 0.3); backdrop-filter: blur(20px); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* SESSION RECAP SCREEN */
.session-recap {
  position: fixed; inset: 0; z-index: 2000;
  background: radial-gradient(ellipse at 30% 20%, rgba(124, 77, 255, 0.4) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(91, 140, 255, 0.3) 0%, transparent 50%),
              rgba(7, 4, 26, 0.98);
  backdrop-filter: blur(20px);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 30px 24px; overflow-y: auto;
}
.session-recap.active { display: flex; }
.recap-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--warmup);
  letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px;
}
.recap-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 4px;
  background: linear-gradient(135deg, #a78bfa, #7c4dff, #5b8cff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; line-height: 1; margin-bottom: 6px;
  animation: recapTitle 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes recapTitle {
  0% { transform: scale(0.3); opacity: 0; }
  60% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); }
}
.recap-subtitle {
  font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text-dim);
  margin-bottom: 28px; text-align: center;
}
.recap-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  width: 100%; max-width: 400px; margin-bottom: 24px;
}
.recap-stat {
  background: rgba(21, 16, 46, 0.8); border: 1px solid rgba(124, 77, 255, 0.25);
  border-radius: 14px; padding: 14px; text-align: center;
  animation: statPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}
.recap-stat:nth-child(1) { animation-delay: 0.2s; }
.recap-stat:nth-child(2) { animation-delay: 0.35s; }
.recap-stat:nth-child(3) { animation-delay: 0.5s; }
.recap-stat:nth-child(4) { animation-delay: 0.65s; }
@keyframes statPop {
  0% { transform: scale(0.6) translateY(20px); opacity: 0; }
  70% { transform: scale(1.05) translateY(0); opacity: 1; }
  100% { transform: scale(1); }
}
.recap-stat-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.recap-stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--brand); line-height: 1; letter-spacing: 1px; }
.recap-stat-unit { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-left: 2px; }
.recap-compare {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
  margin-top: 6px; letter-spacing: 0.5px;
}
.recap-compare.up { color: #4ade80; }
.recap-compare.down { color: #ff9090; }
.recap-compare b { font-weight: 700; }
.recap-pr {
  background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(124, 77, 255, 0.2));
  border: 1px solid #fbbf24; border-radius: 14px; padding: 14px 16px;
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px;
  color: #fbbf24; margin-bottom: 20px; text-align: center;
  box-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
  animation: statPop 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.8s both;
}
.recap-actions { display: flex; gap: 10px; width: 100%; max-width: 400px; animation: statPop 0.5s ease-out 1s both; }
.recap-btn {
  flex: 1; padding: 14px; border-radius: 12px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  transition: transform 0.15s;
}
.recap-btn:active { transform: scale(0.97); }
.recap-btn.primary { background: linear-gradient(135deg, var(--brand), var(--brand-2)); border: 1px solid var(--brand); color: white; box-shadow: 0 4px 20px rgba(124, 77, 255, 0.4); }
.recap-btn.secondary { background: var(--bg-3); border: 1px solid var(--border); color: var(--text); }

/* Confettis pour le recap */
.recap-confetti-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

.exercise, .cardio { animation: slideIn 0.4s ease-out; }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.footer { text-align: center; padding: 30px 20px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }
.weight-input::-webkit-outer-spin-button, .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.weight-input[type=number] { -moz-appearance: textfield; }

@media (max-width: 380px) {
  .counter { padding: 7px 2px; }
  .counter-value { font-size: 18px; min-width: 16px; }
  .counter-btn { width: 20px; height: 20px; font-size: 12px; }
  .counter-controls { gap: 3px; }
  .day-num { font-size: 30px; }
  .ex-image-wrap { width: 66px; height: 66px; }
  .recap-title { font-size: 40px; }
  .recap-stat-value { font-size: 30px; }
}
@media (max-width: 340px) {
  .counter-value { font-size: 16px; }
  .counter-btn { width: 18px; height: 18px; font-size: 11px; }
}

/* ==================== LOGO IMAGE ==================== */
.logo-img {
  width: 34px; height: 34px; border-radius: 9px;
  margin-right: 10px;
  box-shadow: 0 4px 16px rgba(124, 77, 255, 0.45), 0 0 0 1px rgba(124, 77, 255, 0.25);
  object-fit: cover;
}

/* ==================== PROFILE BAR (XP/Level/Credits) ==================== */
.profile-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, rgba(28, 21, 56, 0.7), rgba(15, 10, 36, 0.7));
  border: 1px solid rgba(124, 77, 255, 0.2);
  border-radius: 14px;
  padding: 9px 12px;
  backdrop-filter: blur(8px);
}
.profile-level {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 48px; height: 46px;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  border-radius: 12px; padding: 4px 6px;
  box-shadow: 0 0 16px -4px var(--brand), inset 0 1px 0 rgba(255,255,255,0.2);
  flex-shrink: 0;
}
.profile-level-label { font-family: 'JetBrains Mono', monospace; font-size: 7px; color: rgba(255,255,255,0.8); letter-spacing: 1.5px; line-height: 1; margin-bottom: 1px; }
.profile-level-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: white; line-height: 0.9; letter-spacing: 1px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

.profile-center { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.profile-title-row { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
.profile-title { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.profile-xp-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); flex-shrink: 0; }
.xp-bar {
  height: 7px; background: rgba(15, 10, 36, 0.8);
  border-radius: 4px; overflow: hidden;
  border: 1px solid rgba(124, 77, 255, 0.15);
}
.xp-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #5b8cff 0%, #7c4dff 50%, #a78bfa 100%);
  border-radius: 3px;
  box-shadow: 0 0 10px rgba(124, 77, 255, 0.6);
  transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.profile-credits {
  display: flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(251, 191, 36, 0.05));
  border: 1px solid rgba(251, 191, 36, 0.35);
  border-radius: 10px; padding: 6px 10px;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px;
  color: #fbbf24; letter-spacing: 1px;
  flex-shrink: 0;
  box-shadow: 0 0 10px -2px rgba(251, 191, 36, 0.3);
}
.profile-credits-icon { font-size: 14px; }
.profile-credits.pulse { animation: creditPulse 0.6s ease-out; }
@keyframes creditPulse {
  0% { transform: scale(1); }
  40% { transform: scale(1.18); box-shadow: 0 0 24px rgba(251, 191, 36, 0.6); }
  100% { transform: scale(1); }
}

/* ==================== BOTTOM NAV ==================== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; z-index: 90;
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  background: rgba(10, 6, 32, 0.88);
  border-top: 1px solid rgba(124, 77, 255, 0.25);
  padding: 6px 6px calc(6px + env(safe-area-inset-bottom, 0px));
}
.nav-btn {
  flex: 1; background: transparent; border: none;
  color: var(--text-dim); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 2px; border-radius: 12px;
  transition: all 0.2s;
  position: relative;
}
.nav-btn .nav-icon { font-size: 20px; line-height: 1; filter: grayscale(0.6) opacity(0.7); transition: all 0.2s; }
.nav-btn .nav-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase; }
.nav-btn.active {
  color: var(--brand);
  background: rgba(124, 77, 255, 0.12);
}
.nav-btn.active .nav-icon { filter: none; transform: scale(1.1); }
.nav-btn:active { transform: scale(0.92); }

/* ==================== VIEWS ==================== */
.views { min-height: 50vh; }
.view { display: none; animation: fadeIn 0.25s ease-out; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.tab-content { padding: 20px 16px 40px; }

/* ==================== STATS VIEW ==================== */
.stats-hero {
  background: linear-gradient(135deg, rgba(124, 77, 255, 0.18), rgba(91, 140, 255, 0.1));
  border: 1px solid rgba(124, 77, 255, 0.3);
  border-radius: 20px; padding: 22px 20px;
  margin-bottom: 20px; text-align: center;
  position: relative; overflow: hidden;
}
.stats-hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at top, rgba(167, 139, 250, 0.2), transparent 60%);
  pointer-events: none;
}
.stats-hero-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 3px; margin-bottom: 6px; }
.stats-hero-value {
  font-family: 'Bebas Neue', sans-serif; font-size: 56px;
  background: linear-gradient(135deg, #a78bfa, #7c4dff, #5b8cff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1; letter-spacing: 2px;
  position: relative;
}
.stats-hero-unit { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); margin-left: 6px; }

.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: linear-gradient(135deg, rgba(21, 16, 46, 0.85), rgba(15, 10, 36, 0.9));
  border: 1px solid rgba(124, 77, 255, 0.18);
  border-radius: 14px; padding: 12px 14px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
  background: var(--stat-color, var(--brand));
  box-shadow: 0 0 10px var(--stat-color, var(--brand));
}
.stat-card-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 4px; }
.stat-card-value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text); line-height: 1; letter-spacing: 1px; }
.stat-card-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faint); margin-top: 2px; }
.stat-card-unit { font-size: 12px; color: var(--text-dim); margin-left: 3px; }

.stats-section-title {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); letter-spacing: 2.5px; text-transform: uppercase;
  margin: 22px 4px 12px; display: flex; align-items: center; gap: 10px;
}
.stats-section-title::before {
  content: ''; width: 18px; height: 2px;
  background: var(--brand); box-shadow: 0 0 8px var(--brand);
}

.day-breakdown {
  background: rgba(21, 16, 46, 0.7);
  border: 1px solid rgba(124, 77, 255, 0.15);
  border-radius: 16px; padding: 14px;
  margin-bottom: 20px;
}
.day-breakdown-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid rgba(124, 77, 255, 0.08);
}
.day-breakdown-row:last-child { border-bottom: none; }
.dbr-num {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px;
  color: white; flex-shrink: 0;
  box-shadow: 0 0 12px -4px currentColor;
}
.dbr-info { flex: 1; min-width: 0; }
.dbr-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dbr-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
.dbr-bar-wrap { flex: 1; max-width: 80px; height: 5px; background: rgba(15, 10, 36, 0.8); border-radius: 3px; overflow: hidden; }
.dbr-bar { height: 100%; border-radius: 3px; box-shadow: 0 0 6px currentColor; }
.dbr-count { font-family: 'Bebas Neue', sans-serif; font-size: 20px; min-width: 26px; text-align: right; flex-shrink: 0; }

.top-exos {
  background: rgba(21, 16, 46, 0.7);
  border: 1px solid rgba(124, 77, 255, 0.15);
  border-radius: 16px; padding: 14px;
  margin-bottom: 20px;
}
.top-exo-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(124, 77, 255, 0.08); }
.top-exo-row:last-child { border-bottom: none; }
.top-exo-rank { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--brand); min-width: 26px; }
.top-exo-name { flex: 1; font-size: 12px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.top-exo-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); font-weight: 600; }
.top-exo-val b { color: var(--brand); font-weight: 700; }

.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text-faint);
  font-family: 'Inter', sans-serif; font-size: 13px;
}
.empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

/* ==================== BADGES / TITLES VIEW ==================== */
.title-banner {
  background: linear-gradient(135deg, rgba(251, 191, 36, 0.14), rgba(124, 77, 255, 0.14));
  border: 1px solid rgba(251, 191, 36, 0.3);
  border-radius: 20px; padding: 20px;
  margin-bottom: 20px; text-align: center;
  position: relative; overflow: hidden;
}
.title-banner-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #fbbf24; letter-spacing: 3px; margin-bottom: 6px; }
.title-banner-name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 3px; color: var(--text); line-height: 1; margin-bottom: 4px; }
.title-banner-level { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
.title-banner-next { margin-top: 10px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
.title-banner-next b { color: #fbbf24; }

.titles-list {
  display: grid; gap: 8px;
  margin-bottom: 20px;
}
.title-item {
  display: flex; align-items: center; gap: 12px;
  background: rgba(21, 16, 46, 0.7);
  border: 1px solid rgba(124, 77, 255, 0.12);
  border-radius: 12px; padding: 10px 14px;
  transition: all 0.2s;
}
.title-item.current {
  border-color: #fbbf24;
  background: rgba(251, 191, 36, 0.08);
  box-shadow: 0 0 20px -8px rgba(251, 191, 36, 0.5);
}
.title-item.locked { opacity: 0.4; filter: grayscale(0.5); }
.title-item-emoji { font-size: 24px; flex-shrink: 0; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
.title-item-info { flex: 1; min-width: 0; }
.title-item-name { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; }
.title-item-level { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
.title-item-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  padding: 3px 8px; border-radius: 6px; letter-spacing: 1px;
}
.title-item.current .title-item-badge { background: #fbbf24; color: #1a0f00; font-weight: 700; }
.title-item.locked .title-item-badge { background: var(--bg-3); color: var(--text-faint); }
.title-item.unlocked:not(.current) .title-item-badge { background: rgba(74, 222, 128, 0.2); color: #4ade80; }

.badges-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-bottom: 20px;
}
.badge-card {
  background: rgba(21, 16, 46, 0.7);
  border: 1px solid rgba(124, 77, 255, 0.15);
  border-radius: 16px; padding: 14px 8px;
  text-align: center;
  transition: all 0.2s;
  position: relative;
}
.badge-card.unlocked {
  border-color: var(--brand);
  background: linear-gradient(135deg, rgba(124, 77, 255, 0.12), rgba(91, 140, 255, 0.06));
  box-shadow: 0 0 20px -8px var(--brand);
}
.badge-card.locked { opacity: 0.45; }
.badge-card.locked .badge-emoji { filter: grayscale(1); }
.badge-emoji {
  font-size: 36px; line-height: 1; margin-bottom: 6px;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.4));
}
.badge-name { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; line-height: 1.1; margin-bottom: 4px; }
.badge-desc { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; color: var(--text-dim); letter-spacing: 0.5px; line-height: 1.3; }
.badge-card.locked .badge-desc { color: var(--text-faint); }

/* ==================== SHOP VIEW ==================== */
.shop-intro {
  background: linear-gradient(135deg, rgba(251, 191, 36, 0.14), rgba(124, 77, 255, 0.08));
  border: 1px solid rgba(251, 191, 36, 0.25);
  border-radius: 16px; padding: 14px 16px;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.shop-intro-icon { font-size: 30px; }
.shop-intro-text { flex: 1; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text-dim); line-height: 1.4; }
.shop-intro-text b { color: #fbbf24; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; }

.shop-items {
  display: grid; gap: 10px;
  margin-bottom: 24px;
}
.shop-item {
  background: rgba(21, 16, 46, 0.7);
  border: 1px solid rgba(124, 77, 255, 0.15);
  border-radius: 14px; padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  transition: all 0.2s;
}
.shop-item.equipped { border-color: #4ade80; box-shadow: 0 0 16px -6px #4ade80; }
.shop-item-preview {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  border: 1px solid rgba(124, 77, 255, 0.2);
}
.shop-item-info { flex: 1; min-width: 0; }
.shop-item-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.shop-item-desc { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }

.shop-btn {
  padding: 8px 14px; border-radius: 10px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  border: 1px solid; transition: all 0.15s;
  flex-shrink: 0; font-weight: 700;
  display: flex; align-items: center; gap: 4px;
}
.shop-btn:active { transform: scale(0.94); }
.shop-btn.buy {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  border-color: #fbbf24; color: #1a0f00;
  box-shadow: 0 0 12px -4px rgba(251, 191, 36, 0.6);
}
.shop-btn.buy:disabled {
  background: var(--bg-3);
  border-color: var(--border);
  color: var(--text-faint);
  box-shadow: none;
  cursor: not-allowed;
}
.shop-btn.equip {
  background: var(--bg-3);
  border-color: var(--brand);
  color: var(--brand);
}
.shop-btn.equipped {
  background: #4ade80;
  border-color: #4ade80;
  color: #042f17;
}

.shop-cat-title {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); letter-spacing: 2.5px; text-transform: uppercase;
  margin: 18px 4px 10px; display: flex; align-items: center; gap: 10px;
}
.shop-cat-title::before {
  content: ''; width: 18px; height: 2px;
  background: #fbbf24; box-shadow: 0 0 8px #fbbf24;
}

/* ==================== UNLOCK OVERLAY (level up / badge) ==================== */
.unlock-overlay {
  position: fixed; inset: 0; z-index: 3000;
  background: radial-gradient(ellipse at center, rgba(124, 77, 255, 0.35), rgba(7, 4, 26, 0.97));
  backdrop-filter: blur(16px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.unlock-overlay.active { display: flex; animation: fadeIn 0.25s ease-out; }
.unlock-card {
  background: linear-gradient(135deg, rgba(21, 16, 46, 0.96), rgba(15, 10, 36, 0.96));
  border: 1px solid rgba(124, 77, 255, 0.4);
  border-radius: 28px; padding: 40px 32px 28px;
  text-align: center; position: relative; overflow: hidden;
  max-width: 340px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 80px -20px rgba(124, 77, 255, 0.6);
}
.unlock-burst {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at center, rgba(251, 191, 36, 0.25), transparent 50%);
  animation: burstPulse 2s ease-in-out infinite;
}
@keyframes burstPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}
.unlock-icon {
  font-size: 80px; line-height: 1; margin-bottom: 12px;
  filter: drop-shadow(0 0 24px rgba(251, 191, 36, 0.6));
  animation: unlockBounce 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
}
@keyframes unlockBounce {
  0% { transform: scale(0.2) rotate(-180deg); opacity: 0; }
  60% { transform: scale(1.25) rotate(15deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); }
}
.unlock-kind {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: #fbbf24; letter-spacing: 4px; margin-bottom: 8px;
  position: relative;
}
.unlock-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 38px;
  background: linear-gradient(135deg, #a78bfa, #7c4dff, #5b8cff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1; letter-spacing: 2px; margin-bottom: 8px;
  position: relative;
}
.unlock-subtitle {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: var(--text-dim); margin-bottom: 16px; position: relative;
}
.unlock-reward {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  color: #fbbf24; letter-spacing: 2px; margin-bottom: 24px;
  padding: 8px 16px; background: rgba(251, 191, 36, 0.12);
  border: 1px solid rgba(251, 191, 36, 0.35);
  border-radius: 10px; display: inline-block;
  position: relative;
}
.unlock-reward:empty { display: none; }
.unlock-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  border: none; color: white;
  border-radius: 12px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  letter-spacing: 3px; text-transform: uppercase; font-weight: 700;
  box-shadow: 0 6px 24px -6px var(--brand);
  position: relative;
}
.unlock-btn:active { transform: scale(0.97); }

/* ==================== CONFIRM OVERLAY ==================== */
.confirm-overlay {
  position: fixed; inset: 0; z-index: 2500;
  background: rgba(7, 4, 26, 0.85); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.confirm-overlay.active { display: flex; animation: fadeIn 0.2s ease-out; }
.confirm-card {
  background: rgba(21, 16, 46, 0.98);
  border: 1px solid rgba(124, 77, 255, 0.3);
  border-radius: 20px; padding: 24px;
  max-width: 320px; width: 100%;
  box-shadow: 0 16px 50px rgba(0,0,0,0.6);
}
.confirm-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; margin-bottom: 8px; text-align: center; }
.confirm-body { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text-dim); margin-bottom: 20px; text-align: center; line-height: 1.5; }
.confirm-actions { display: flex; gap: 10px; }
.confirm-btn {
  flex: 1; padding: 12px; border-radius: 10px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;
  border: 1px solid;
}
.confirm-btn:active { transform: scale(0.96); }
.confirm-btn.cancel { background: var(--bg-3); border-color: var(--border); color: var(--text); }
.confirm-btn.ok { background: linear-gradient(135deg, #fbbf24, #f59e0b); border-color: #fbbf24; color: #1a0f00; }

/* ==================== RECAP ADDITIONS ==================== */
.recap-rewards {
  display: flex; gap: 10px; justify-content: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
  animation: statPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.75s both;
}
.recap-reward-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 12px;
  font-family: 'Bebas Neue', sans-serif; font-size: 20px;
  letter-spacing: 2px;
  border: 1px solid;
}
.recap-reward-chip.xp {
  background: linear-gradient(135deg, rgba(124, 77, 255, 0.2), rgba(91, 140, 255, 0.1));
  border-color: var(--brand); color: #a78bfa;
  box-shadow: 0 0 20px -6px var(--brand);
}
.recap-reward-chip.credit {
  background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(245, 158, 11, 0.1));
  border-color: #fbbf24; color: #fbbf24;
  box-shadow: 0 0 20px -6px #fbbf24;
}
.recap-reward-icon { font-size: 18px; }
.recap-levelup {
  background: linear-gradient(135deg, rgba(167, 139, 250, 0.25), rgba(124, 77, 255, 0.2));
  border: 1px solid #a78bfa;
  border-radius: 14px; padding: 12px 16px;
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
  color: #a78bfa; margin-bottom: 14px; text-align: center;
  box-shadow: 0 0 30px rgba(167, 139, 250, 0.4);
  animation: statPop 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.95s both;
}
.recap-levelup small { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim); margin-top: 2px; }

/* ==================== THEMES ==================== */
body[data-theme="fire"] {
  background:
    radial-gradient(ellipse at 15% 0%, rgba(255, 85, 85, 0.22) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 30%, rgba(251, 146, 60, 0.18) 0%, transparent 50%),
    linear-gradient(180deg, #1a0808 0%, #0f0404 50%, #1a0808 100%);
  background-attachment: fixed;
}
body[data-theme="fire"] { --brand: #ff5555; --brand-2: #f59e0b; }

body[data-theme="matrix"] {
  background:
    radial-gradient(ellipse at 15% 0%, rgba(74, 222, 128, 0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 30%, rgba(16, 185, 129, 0.15) 0%, transparent 50%),
    linear-gradient(180deg, #041a10 0%, #020f08 50%, #041a10 100%);
  background-attachment: fixed;
}
body[data-theme="matrix"] { --brand: #4ade80; --brand-2: #10b981; }

body[data-theme="gold"] {
  background:
    radial-gradient(ellipse at 15% 0%, rgba(251, 191, 36, 0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 30%, rgba(245, 158, 11, 0.15) 0%, transparent 50%),
    linear-gradient(180deg, #1a1200 0%, #0f0900 50%, #1a1200 100%);
  background-attachment: fixed;
}
body[data-theme="gold"] { --brand: #fbbf24; --brand-2: #f59e0b; }

body[data-theme="neon"] {
  background:
    radial-gradient(ellipse at 15% 0%, rgba(236, 72, 153, 0.22) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 30%, rgba(168, 85, 247, 0.18) 0%, transparent 50%),
    linear-gradient(180deg, #1a0818 0%, #0f040e 50%, #1a0818 100%);
  background-attachment: fixed;
}
body[data-theme="neon"] { --brand: #ec4899; --brand-2: #a855f7; }

body[data-theme="ice"] {
  background:
    radial-gradient(ellipse at 15% 0%, rgba(34, 211, 238, 0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
    linear-gradient(180deg, #041220 0%, #020a14 50%, #041220 100%);
  background-attachment: fixed;
}
body[data-theme="ice"] { --brand: #22d3ee; --brand-2: #3b82f6; }

/* Body padding for bottom nav */
body { padding-bottom: 80px; }
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  body { padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }
}
</style>

<body>

<header class="header">
  <div class="logo-row">
    <img id="logoImg" class="logo-img" alt="Ryze">
    <div class="logo-text">RYZE</div>
  </div>
  <div class="profile-bar" id="profileBar"></div>
  <div class="counters" id="counters"></div>
</header>

<main class="views">
  <section class="view active" data-view="train">
    <div class="days-container" id="days"></div>
    <div class="footer">Rien que ça pousse 🧌</div>
  </section>

  <section class="view" data-view="stats">
    <div class="tab-content" id="statsContent"></div>
  </section>

  <section class="view" data-view="trophies">
    <div class="tab-content" id="trophiesContent"></div>
  </section>

  <section class="view" data-view="shop">
    <div class="tab-content" id="shopContent"></div>
  </section>
</main>

<nav class="bottom-nav" id="bottomNav">
  <button class="nav-btn active" data-view="train">
    <span class="nav-icon">🏋️</span><span class="nav-label">Train</span>
  </button>
  <button class="nav-btn" data-view="stats">
    <span class="nav-icon">📊</span><span class="nav-label">Stats</span>
  </button>
  <button class="nav-btn" data-view="trophies">
    <span class="nav-icon">🏆</span><span class="nav-label">Trophées</span>
  </button>
  <button class="nav-btn" data-view="shop">
    <span class="nav-icon">🛒</span><span class="nav-label">Boutique</span>
  </button>
</nav>

<div class="timer-overlay" id="timerOverlay">
  <div class="timer-label" id="timerLabel">Repos</div>
  <div class="timer-ring">
    <svg viewBox="0 0 240 240">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7c4dff"/>
          <stop offset="100%" stop-color="#3b63ff"/>
        </linearGradient>
      </defs>
      <circle class="bg-circle" cx="120" cy="120" r="110"/>
      <circle class="fg-circle" id="timerCircle" cx="120" cy="120" r="110"/>
    </svg>
    <div class="timer-time" id="timerTime">00:00</div>
  </div>
  <div class="timer-actions">
    <button class="timer-action" onclick="addTime(15)">+15s</button>
    <button class="timer-action stop" onclick="stopTimer()">Stop</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="unlock-overlay" id="unlockOverlay">
  <div class="unlock-card">
    <div class="unlock-burst"></div>
    <div class="unlock-icon" id="unlockIcon">⭐</div>
    <div class="unlock-kind" id="unlockKind">NIVEAU DÉBLOQUÉ</div>
    <div class="unlock-title" id="unlockTitle">Niveau 5</div>
    <div class="unlock-subtitle" id="unlockSubtitle">Nouveau titre : Apprenti</div>
    <div class="unlock-reward" id="unlockReward">+250 crédits</div>
    <button class="unlock-btn" onclick="closeUnlock()">CONTINUER</button>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-card">
    <div class="confirm-title" id="confirmTitle">Confirmer ?</div>
    <div class="confirm-body" id="confirmBody">Es-tu sûr ?</div>
    <div class="confirm-actions">
      <button class="confirm-btn cancel" onclick="resolveConfirm(false)">Annuler</button>
      <button class="confirm-btn ok" onclick="resolveConfirm(true)">Confirmer</button>
    </div>
  </div>
</div>

<div class="session-recap" id="sessionRecap">
  <div class="recap-confetti-layer" id="recapConfetti"></div>
  <div class="recap-badge">SÉANCE TERMINÉE</div>
  <div class="recap-title" id="recapTitle">BRAVO 💪</div>
  <div class="recap-subtitle" id="recapSubtitle">Jour 1 · Pecs + Triceps</div>
  <div id="recapLevelup" class="recap-levelup" style="display:none"></div>
  <div id="recapPR" class="recap-pr" style="display:none">🏆 NOUVEAU RECORD</div>
  <div id="recapRewards" class="recap-rewards" style="display:none"></div>
  <div class="recap-stats" id="recapStats"></div>
  <div class="recap-actions">
    <button class="recap-btn secondary" onclick="closeRecap(false)">Fermer</button>
    <button class="recap-btn primary" onclick="closeRecap(true)">Valider +1</button>
  </div>
</div>

// ================== STATE ==================
const STORAGE_KEY = 'ryze_v2';
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return migrateState(JSON.parse(raw));
  } catch(e) {}
  // Migration depuis v1
  try {
    const old = localStorage.getItem('ryze_v1') || localStorage.getItem('muscu_elian_v1');
    if (old) {
      const parsed = JSON.parse(old);
      return migrateState(parsed);
    }
  } catch(e) {}
  return {
    counters: { 1: 0, 2: 0, 3: 0, 4: 0 },
    weights: {}, feelings: {}, comments: {}, done: {},
    history: {}, // { exId: [{ date, weight }] }
    orders: {},  // { day: [exId, ...] randomized order per section concatenated }
    openDay: null,
    sessionStart: {}, // { day: timestamp of first checked exo }
    lastSessionTonnage: {}, // { day: tonnage from last validated session }
    prs: {}, // { exId: maxWeight }
    // Progression
    xp: 0,
    level: 1,
    credits: 0,
    // Stats cumulées
    totalSessions: 0,
    totalTonnage: 0,
    totalDuration: 0, // ms
    totalPRs: 0,
    creditsEarned: 0,
    creditsSpent: 0,
    sessionHistory: [], // [{ date, day, duration, tonnage, xp, credits, prs }]
    // Badges
    badges: {}, // { badgeId: timestamp }
    // Customization
    theme: 'default',
    timerSound: 'classic',
    ownedThemes: ['default'],
    ownedSounds: ['classic'],
    ownedAvatars: ['default'],
    avatar: 'default'
  };
}

function migrateState(s) {
  s.counters = s.counters || { 1: 0, 2: 0, 3: 0, 4: 0 };
  s.weights = s.weights || {};
  s.feelings = s.feelings || {};
  s.comments = s.comments || {};
  s.done = s.done || {};
  s.history = s.history || {};
  s.orders = s.orders || {};
  s.sessionStart = s.sessionStart || {};
  s.lastSessionTonnage = s.lastSessionTonnage || {};
  s.prs = s.prs || {};
  // Progression
  if (s.xp === undefined) s.xp = 0;
  if (s.level === undefined) s.level = 1;
  if (s.credits === undefined) s.credits = 0;
  if (s.totalSessions === undefined) {
    s.totalSessions = Object.values(s.counters || {}).reduce((a,b) => a+b, 0);
  }
  if (s.totalTonnage === undefined) s.totalTonnage = 0;
  if (s.totalDuration === undefined) s.totalDuration = 0;
  if (s.totalPRs === undefined) s.totalPRs = Object.keys(s.prs || {}).length;
  if (s.creditsEarned === undefined) s.creditsEarned = 0;
  if (s.creditsSpent === undefined) s.creditsSpent = 0;
  if (!Array.isArray(s.sessionHistory)) s.sessionHistory = [];
  s.badges = s.badges || {};
  if (!s.theme) s.theme = 'default';
  if (!s.timerSound) s.timerSound = 'classic';
  if (!Array.isArray(s.ownedThemes) || !s.ownedThemes.includes('default')) s.ownedThemes = ['default'];
  if (!Array.isArray(s.ownedSounds) || !s.ownedSounds.includes('classic')) s.ownedSounds = ['classic'];
  if (!Array.isArray(s.ownedAvatars) || !s.ownedAvatars.includes('default')) s.ownedAvatars = ['default'];
  if (!s.avatar) s.avatar = 'default';
  return s;
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ================== RANDOMIZE ORDER ==================
function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Build order: randomize within each section, sections keep their natural order
function buildDayOrder(day) {
  const d = WORKOUT[day];
  const result = [];
  d.sections.forEach((sec, si) => {
    const shuffled = shuffleArray(sec.exercises);
    shuffled.forEach(ex => result.push({ secIdx: si, exId: ex.id }));
  });
  return result;
}

function getDayOrder(day) {
  if (!state.orders[day] || !Array.isArray(state.orders[day]) || state.orders[day].length === 0) {
    state.orders[day] = buildDayOrder(day);
    saveState();
  }
  return state.orders[day];
}

function reshuffleDay(day) {
  state.orders[day] = buildDayOrder(day);
  saveState();
  renderDays();
  // Re-open the day that was just reshuffled
  state.openDay = day;
  saveState();
  document.querySelector(`.day[data-d="${day}"]`)?.classList.add('open');
  showToast(`Jour ${day} re-mélangé 🎲`);
  vibrate(30);
}

function changeCounter(day, delta) {
  state.counters[day] = Math.max(0, (state.counters[day] || 0) + delta);
  saveState();
  const valueEl = document.getElementById(`cv-${day}`);
  const counterEl = document.querySelector(`.counter[data-day="${day}"]`);
  if (valueEl) {
    valueEl.textContent = state.counters[day];

const CONFETTI_COLORS = {
  1: ['#ff5555', '#ff8080', '#ffaaaa', '#7c4dff', '#a78bfa', '#ffcc88'],
  2: ['#5b8cff', '#80a8ff', '#a8c4ff', '#7c4dff', '#a78bfa', '#88e0ff'],
  3: ['#4ade80', '#6bf0a0', '#a0f5c0', '#7c4dff', '#a78bfa', '#88ffaa'],
  4: ['#fbbf24', '#fcd34d', '#fde68a', '#7c4dff', '#a78bfa', '#ffcc00']
};

function spawnConfetti(parent, day, count = 40) {
  const colors = CONFETTI_COLORS[day] || CONFETTI_COLORS[1];
  const rect = parent.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('span');
    const type = i % 3;
    p.className = 'confetti' + (type === 0 ? ' star' : '');
    const color = colors[i % colors.length];
    p.style.background = color;
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.boxShadow = `0 0 10px ${color}, 0 0 4px ${color}`;
    const size = 5 + Math.random() * 6;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    parent.appendChild(p);
    const angle = (Math.PI * 2 * i) / count + (Math.random() * 0.8 - 0.4);
    const dist = 55 + Math.random() * 85;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 25;
    const rot = (Math.random() * 1080 - 540);
    const dur = 800 + Math.random() * 700;
    p.animate([
      { transform: 'translate(-50%, -50%) scale(0.2) rotate(0deg)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx*0.5}px), calc(-50% + ${dy*0.4}px)) scale(1.2) rotate(${rot*0.5}deg)`, opacity: 1, offset: 0.5 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy + 60}px)) scale(0.3) rotate(${rot}deg)`, opacity: 0 }
    ], { duration: dur, easing: 'cubic-bezier(.2,.6,.4,1)', fill: 'forwards' });
    setTimeout(() => p.remove(), dur);
  }
  const flash = document.createElement('span');
  flash.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;width:10px;height:10px;border-radius:50%;background:white;box-shadow:0 0 40px 8px ${colors[0]},0 0 20px 4px white;transform:translate(-50%,-50%);pointer-events:none;z-index:999`;
  parent.appendChild(flash);
  flash.animate([
    { opacity: 1, transform: 'translate(-50%, -50%) scale(0.3)' },
    { opacity: 1, transform: 'translate(-50%, -50%) scale(2.5)', offset: 0.3 },
    { opacity: 0, transform: 'translate(-50%, -50%) scale(3)' }
  ], { duration: 500, fill: 'forwards' });
  setTimeout(() => flash.remove(), 500);
}

// ================== DAY/EXO RENDERING ==================
function getExoById(id) {
  for (let d = 1; d <= 4; d++) {

      const ex = sec.exercises.find(e => e.id === id);
      if (ex) return { exo: ex, day: d };

  return null;

    header.className = 'day-header';

    inner.appendChild(renderCardio(day.warmup, false));

    // Build sections with randomized order
    const order = getDayOrder(d);
    const bySection = {};
    order.forEach(item => {
      if (!bySection[item.secIdx]) bySection[item.secIdx] = [];
      const exo = day.sections[item.secIdx].exercises.find(e => e.id === item.exId);
      if (exo) bySection[item.secIdx].push(exo);

    inner.appendChild(renderCardio(day.cooldown, true));
    body.appendChild(inner);

    container.appendChild(dayEl);

}

// ================== CHART ==================
function renderChart(exId) {
  const history = state.history[exId] || [];
  if (history.length === 0) {
    return `<div class="ex-chart"><div class="ex-chart-label"><span>Progression</span></div><div class="ex-chart-empty">Valide ta 1ère séance pour voir ta progression</div></div>`;
  }
  const last = history.slice(-10); // 10 dernières
  if (last.length === 1) {
    return `<div class="ex-chart"><div class="ex-chart-label"><span>Progression</span><span class="ex-chart-trend">1 séance</span></div><div class="ex-chart-empty">Poids: ${last[0].weight} kg</div></div>`;
  }
  const weights = last.map(h => h.weight);
  const min = Math.min(...weights);
  const max = Math.max(...weights);
  const range = max - min || 1;
  const W = 300, H = 50, P = 4;
  const xs = last.map((_, i) => P + (i * (W - 2*P)) / (last.length - 1));
  const ys = last.map(h => P + (1 - (h.weight - min) / range) * (H - 2*P));

  let path = `M ${xs[0]} ${ys[0]}`;
  for (let i = 1; i < xs.length; i++) path += ` L ${xs[i]} ${ys[i]}`;

  let fillPath = path + ` L ${xs[xs.length-1]} ${H} L ${xs[0]} ${H} Z`;

  const points = xs.map((x, i) => `<circle cx="${x}" cy="${ys[i]}" r="2.5" fill="#a78bfa"/>`).join('');

  const first = weights[0], lastW = weights[weights.length-1];
  const delta = lastW - first;
  let trendClass = 'same', trendText = '→ stable';
  if (delta > 0.01) { trendClass = 'up'; trendText = `↑ +${delta.toFixed(1)} kg`; }
  else if (delta < -0.01) { trendClass = 'down'; trendText = `↓ ${delta.toFixed(1)} kg`; }

  return `<div class="ex-chart">
    <div class="ex-chart-label">
      <span>Progression · ${last.length} dernières séances</span>
      <span class="ex-chart-trend ${trendClass}">${trendText}</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="chartGrad-${exId}" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#7c4dff" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="chartLine-${exId}" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#5b8cff"/>
          <stop offset="100%" stop-color="#7c4dff"/>
        </linearGradient>
      </defs>
      <path d="${fillPath}" fill="url(#chartGrad-${exId})"/>
      <path d="${path}" fill="none" stroke="url(#chartLine-${exId})" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${points}
    </svg>
  </div>`;
}

function parseRest(r) {
  const m = r.match(/\d+/);
  return m ? parseInt(m[0]) : 60;
}

function toggleDay(d) {
  state.openDay = state.openDay === d ? null : d;
  saveState();
  document.querySelectorAll('.day').forEach(el => {
    el.classList.toggle('open', parseInt(el.dataset.day) === state.openDay);
  });
  if (state.openDay === d) {
    setTimeout(() => {
      const el = document.querySelector(`.day[data-day="${d}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function toggleDone(id, ev) {
  ev.stopPropagation();
  const was = !!state.done[id];
  state.done[id] = !was;
  const info = getExoById(id);
  const day = info ? info.day : null;

  // Register session start
  if (state.done[id] && day) {
    if (!state.sessionStart[day]) {
      state.sessionStart[day] = Date.now();
    }
  }
  saveState();
  const el = document.getElementById(id);
  el.classList.toggle('done', state.done[id]);
  if (state.done[id]) vibrate(30);
  updateAllProgress();

  // Check if whole day is done -> show recap
  if (day && state.done[id] && isDayComplete(day)) {
    setTimeout(() => showSessionRecap(day), 400);
  }
}

function isDayComplete(day) {
  const all = [];
  WORKOUT[day].sections.forEach(sec => sec.exercises.forEach(ex => all.push(ex.id)));
  return all.every(id => state.done[id]);
}

function updateWeight(id, val) {
  const num = parseFloat(val);
  if (!isNaN(num)) { state.weights[id] = num; saveState(); }
}

function updateFeel(id, val) { state.feelings[id] = val; saveState(); }

function updateComment(id, val) {
  state.comments[id] = val;
  // debounce save
  clearTimeout(updateComment._t);
  updateComment._t = setTimeout(saveState, 300);
}

function resetDay(d) {
  Object.keys(state.done).forEach(k => {
    if (k.startsWith(`d${d}e`)) delete state.done[k];
  });
  delete state.sessionStart[d];
  saveState();
  document.querySelectorAll(`[id^="d${d}e"]`).forEach(el => el.classList.remove('done'));
  updateAllProgress();
  showToast(`Jour ${d} réinitialisé`);
  vibrate(40);
}

function updateAllProgress() {
  for (let d = 1; d <= 4; d++) {
    const total = WORKOUT[d].sections.reduce((s, sec) => s + sec.exercises.length, 0);
    const done = Object.keys(state.done).filter(k => k.startsWith(`d${d}e`) && state.done[k]).length;
    const fill = document.getElementById(`progfill-${d}`);
    const prog = document.getElementById(`prog-${d}`);
    if (fill) fill.style.width = `${(done/total) * 100}%`;
    if (prog) prog.textContent = `${done} / ${total} fait${done > 1 ? 's' : ''}`;
  }
}

// ================== TIMER (robuste arrière-plan) ==================
// On stocke l'heure de fin en ms. L'intervalle visuel recalcule à partir de Date.now()
let timerInt = null;
let timerEndsAt = 0;   // timestamp
let timerTotal = 0;    // seconds total (for the ring)
let notificationPermission = 'default';

async function requestNotifPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    try {
      notificationPermission = await Notification.requestPermission();
    } catch(e) {}
  } else {
    notificationPermission = Notification.permission;
  }
}

function scheduleNotification(name, delayMs) {
  // Use service worker if available for notifications that persist in background
  // Fallback: setTimeout (works if JS still running in background)
  if (timerNotifTimeout) clearTimeout(timerNotifTimeout);
  timerNotifTimeout = setTimeout(() => {
    sendNotification(name);
  }, delayMs);
}

let timerNotifTimeout = null;

function sendNotification(name) {
  try {
    if ('Notification' in window && Notification.permission === 'granted') {
      const n = new Notification('Ryze · Repos terminé', {
        body: `Go ! Prochaine série de ${name}`,
        icon: IMAGES.logo,
        badge: IMAGES.logo,
        tag: 'ryze-rest',
        requireInteraction: false,
        silent: false
      });
      setTimeout(() => { try { n.close(); } catch(e) {} }, 8000);
    }
  } catch(e) {}
}

function startTimer(seconds, exName, exId) {
  stopTimer(true);
  requestNotifPermission();
  timerTotal = seconds;
  timerEndsAt = Date.now() + seconds * 1000;
  document.getElementById('timerLabel').textContent = 'Repos · ' + exName;
  document.getElementById('timerOverlay').classList.add('active');

  // Persist timer state
  try {
    localStorage.setItem('ryze_timer', JSON.stringify({ endsAt: timerEndsAt, total: seconds, name: exName }));
  } catch(e) {}

  // Schedule notification
  scheduleNotification(exName, seconds * 1000);

  updateTimerDisplay();
  timerInt = setInterval(updateTimerDisplay, 200);
  vibrate(20);
}

function updateTimerDisplay() {
  const remainingMs = Math.max(0, timerEndsAt - Date.now());
  const remainingSec = Math.ceil(remainingMs / 1000);
  const m = Math.floor(remainingSec / 60);
  const s = remainingSec % 60;
  document.getElementById('timerTime').textContent =
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const circ = 691;
  const ratio = timerTotal > 0 ? (remainingMs / 1000) / timerTotal : 0;
  const offset = circ - ratio * circ;
  document.getElementById('timerCircle').style.strokeDashoffset = offset;

  if (remainingMs <= 0) finishTimer();
}

function addTime(sec) {
  timerEndsAt += sec * 1000;
  timerTotal += sec;
  try {
    const raw = localStorage.getItem('ryze_timer');
    if (raw) {
      const t = JSON.parse(raw);
      t.endsAt = timerEndsAt;
      t.total = timerTotal;
      localStorage.setItem('ryze_timer', JSON.stringify(t));
    }
  } catch(e) {}
  // Reschedule notification
  const label = document.getElementById('timerLabel').textContent.replace('Repos · ', '');
  scheduleNotification(label, Math.max(0, timerEndsAt - Date.now()));
  updateTimerDisplay();
}

function stopTimer(silent) {
  if (timerInt) clearInterval(timerInt);
  timerInt = null;
  if (timerNotifTimeout) { clearTimeout(timerNotifTimeout); timerNotifTimeout = null; }
  document.getElementById('timerOverlay').classList.remove('active');
  try { localStorage.removeItem('ryze_timer'); } catch(e) {}
}

function finishTimer() {
  const label = document.getElementById('timerLabel').textContent.replace('Repos · ', '');
  stopTimer(true);
  playBeep();
  vibrate([200, 100, 200, 100, 400]);
  // If doc hidden, also fire notification (not already scheduled or if it didn't fire)
  if (document.hidden) sendNotification(label);
  showToast('Repos terminé — Go !');
}

// Restore timer on load if it was running
function restoreTimer() {
  try {
    const raw = localStorage.getItem('ryze_timer');
    if (!raw) return;
    const t = JSON.parse(raw);
    const remainingMs = t.endsAt - Date.now();
    if (remainingMs > 0) {
      timerEndsAt = t.endsAt;
      timerTotal = t.total;
      document.getElementById('timerLabel').textContent = 'Repos · ' + t.name;
      document.getElementById('timerOverlay').classList.add('active');
      updateTimerDisplay();
      timerInt = setInterval(updateTimerDisplay, 200);
      // Reschedule notif for remaining time
      scheduleNotification(t.name, remainingMs);
    } else {
      localStorage.removeItem('ryze_timer');
    }
  } catch(e) {}
}

// Handle visibility changes - re-sync when app comes back
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    // App came back to foreground
    if (timerEndsAt > 0) {
      const remaining = timerEndsAt - Date.now();
      if (remaining <= 0) {
        // Timer already finished in background
        finishTimer();
      } else {
        // Re-sync display
        updateTimerDisplay();
      }
    }
  }
});

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.2);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.2);
    });
  } catch(e) {}
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

// ================== SESSION RECAP ==================
function computeTonnage(day) {
  let total = 0;
  WORKOUT[day].sections.forEach(sec => {
    sec.exercises.forEach(ex => {
      if (!state.done[ex.id]) return;
      const w = state.weights[ex.id] !== undefined ? state.weights[ex.id] : ex.weight;
      // Dips assistés: assistance = poids qu'on SOUSTRAIT, on ignore pour le tonnage
      // Relevés de jambes: poids du corps (w=0), on compte 70kg arbitraire pour le poids du corps
      let effectiveW = w;
      if (ex.id === 'd1e4') effectiveW = Math.max(0, 75 - w); // Poids du corps ~75kg - assistance
      if (ex.weight === 0) effectiveW = 75; // Poids du corps
      total += effectiveW * ex.setsCount * ex.repsMax;
    });
  });
  return Math.round(total);
}

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h${String(m).padStart(2,'0')}`;
  return `${m}min ${String(s).padStart(2,'0')}`;
}

let pendingRecapDay = null;

function showSessionRecap(day) {
  pendingRecapDay = day;

  title.textContent = 'BRAVO 💪';

  const exosDone = WORKOUT[day].sections.reduce((s, sec) =>
    s + sec.exercises.filter(e => state.done[e.id]).length, 0);
  const totalExos = WORKOUT[day].sections.reduce((s, sec) => s + sec.exercises.length, 0);

  const rawStart = state.sessionStart[day];
  // Fix bug: si la session a été démarrée AVANT l'ouverture de l'appli actuelle,
  // on prend comme départ l'ouverture de l'appli (sinon le chrono affiche
  // le temps depuis la dernière fois, pas depuis que t'as ouvert)
  const effectiveStart = rawStart && rawStart > APP_OPENED_AT ? rawStart : APP_OPENED_AT;
  const duration = rawStart ? (Date.now() - effectiveStart) : 0;
  const tonnage = computeTonnage(day);
  const lastTonnage = state.lastSessionTonnage[day] || 0;

  // PR check
  let prFound = null;
  WORKOUT[day].sections.forEach(sec => {
    sec.exercises.forEach(ex => {
      if (!state.done[ex.id]) return;
      const w = state.weights[ex.id] !== undefined ? state.weights[ex.id] : ex.weight;
      const prev = state.prs[ex.id] || 0;
      if (w > prev && w > 0 && ex.weight !== 0) {
        if (!prFound || w - prev > prFound.gain) {
          prFound = { name: ex.name, weight: w, gain: w - prev };
        }
      }
    });

  if (prFound) {
    prBadge.innerHTML = `🏆 NEW PR · ${prFound.name.toUpperCase()} · ${prFound.weight} KG`;
    prBadge.style.display = 'block';
  } else {
    prBadge.style.display = 'none';
  }

  // Compare tonnage
  let cmpText = '', cmpClass = '';
  if (lastTonnage > 0) {
    const diff = tonnage - lastTonnage;
    if (diff > 0) { cmpClass = 'up'; cmpText = `↑ +${diff} kg vs dernière`; }
    else if (diff < 0) { cmpClass = 'down'; cmpText = `↓ ${diff} kg vs dernière`; }
    else { cmpText = '= même tonnage'; }
  }

  stats.innerHTML = `
    <div class="recap-stat">
      <div class="recap-stat-label">Durée</div>
      <div class="recap-stat-value">${duration > 0 ? formatDuration(duration) : '—'}</div>
    </div>
    <div class="recap-stat">
      <div class="recap-stat-label">Exercices</div>
      <div class="recap-stat-value">${exosDone}<span class="recap-stat-unit">/${totalExos}</span></div>
    </div>

      <div class="recap-stat-label">Tonnage</div>
      <div class="recap-stat-value">${tonnage.toLocaleString('fr-FR')}<span class="recap-stat-unit">kg</span></div>
      ${cmpText ? `<div class="recap-compare ${cmpClass}">${cmpText}</div>` : ''}
    </div>
    <div class="recap-stat">
      <div class="recap-stat-label">Calories (≈)</div>
      <div class="recap-stat-value">${Math.round(tonnage / 40)}<span class="recap-stat-unit">kcal</span></div>
    </div>
  `;

  recap.classList.add('active');

  // Big confettis
  setTimeout(() => {
    const layer = document.getElementById('recapConfetti');
    burstRecapConfetti(layer, day);
  }, 400);
  setTimeout(() => burstRecapConfetti(document.getElementById('recapConfetti'), day), 900);
  setTimeout(() => burstRecapConfetti(document.getElementById('recapConfetti'), day), 1400);

  vibrate([100, 50, 100, 50, 200]);
  playBeep();
}

function burstRecapConfetti(layer, day) {
  const colors = CONFETTI_COLORS[day] || CONFETTI_COLORS[1];
  const w = layer.offsetWidth;
  const h = layer.offsetHeight;
  const count = 70;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('span');
    p.className = 'confetti' + (i % 2 === 0 ? ' star' : '');
    const color = colors[i % colors.length];
    p.style.background = color;
    p.style.boxShadow = `0 0 10px ${color}`;
    const size = 6 + Math.random() * 8;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    const startX = Math.random() * w;
    const startY = -20;
    p.style.left = startX + 'px';
    p.style.top = startY + 'px';
    layer.appendChild(p);
    const endX = startX + (Math.random() * 300 - 150);
    const endY = h + 40;
    const rot = Math.random() * 1440 - 720;
    const dur = 2200 + Math.random() * 1500;
    p.animate([
      { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
      { transform: `translate(${endX - startX}px, ${endY - startY}px) rotate(${rot}deg)`, opacity: 0 }
    ], { duration: dur, easing: 'cubic-bezier(.3,.7,.6,1)', fill: 'forwards' });
    setTimeout(() => p.remove(), dur);
  }
}

function closeRecap(validate) {
  const recap = document.getElementById('sessionRecap');
  recap.classList.remove('active');
  if (validate && pendingRecapDay) {
    const d = pendingRecapDay;
    // Save tonnage as last
    const t = computeTonnage(d);
    state.lastSessionTonnage[d] = t;
    // Save history + PRs
    WORKOUT[d].sections.forEach(sec => {
      sec.exercises.forEach(ex => {
        if (!state.done[ex.id]) return;
        const w = state.weights[ex.id] !== undefined ? state.weights[ex.id] : ex.weight;
        if (!state.history[ex.id]) state.history[ex.id] = [];
        state.history[ex.id].push({ date: Date.now(), weight: w });
        // Cap history at 30 entries
        if (state.history[ex.id].length > 30) {
          state.history[ex.id] = state.history[ex.id].slice(-30);
        }
        if (w > (state.prs[ex.id] || 0) && ex.weight !== 0) {
          state.prs[ex.id] = w;
        }
      });
    });
    // Increment counter
    state.counters[d] = (state.counters[d] || 0) + 1;
    // Reset done and session start
    Object.keys(state.done).forEach(k => {
      if (k.startsWith(`d${d}e`)) delete state.done[k];
    });
    delete state.sessionStart[d];
    // Reshuffle for next time
    state.orders[d] = buildDayOrder(d);
    saveState();
    renderCounters();
    // Animate counter
    const valEl = document.getElementById(`cv-${d}`);
    if (valEl) {
      valEl.textContent = state.counters[d];
      valEl.classList.remove('pop');
      void valEl.offsetWidth;
      valEl.classList.add('pop');
    }
    const counterEl = document.querySelector(`.counter[data-day="${d}"]`);
    if (counterEl) spawnConfetti(counterEl, d, 50);
    renderDays();
    state.openDay = null;
    saveState();
    showToast('Séance validée ! +1 💪');
  }
  pendingRecapDay = null;
}

// Cumulative XP needed to REACH level N: 25 * (N-1) * N (triangular-ish curve)
// L1=0, L2=50, L3=150, L4=300, L5=500, L10=2250, L20=9500, L50=61250
function xpToReachLevel(n) { return 25 * (n - 1) * n; }
function xpForNextLevel(currentLevel) { return xpToReachLevel(currentLevel + 1) - xpToReachLevel(currentLevel); }
function levelFromXp(xp) {
  let lvl = 1;
  while (xpToReachLevel(lvl + 1) <= xp) lvl++;
  return lvl;
}
function currentTitle(level) {
  let t = TITLES[0];
  for (const title of TITLES) {
    if (level >= title.level) t = title;
  }
  return t;
}
function nextTitle(level) {
  for (const title of TITLES) {
    if (title.level > level) return title;
  }
  return null;
}

// ================== XP / LEVEL / CREDITS ==================
// Formule XP par séance: 50 base + tonnage/500 + exos*5 + prs*25 + (streak bonus)
function computeSessionRewards(day, tonnage, exosCount, prsCount) {
  const baseXP = 50;
  const tonnageXP = Math.floor(tonnage / 500);
  const exoXP = exosCount * 5;
  const prXP = prsCount * 25;
  // Progression vs dernière session
  const last = state.lastSessionTonnage[day] || 0;
  const progressBonus = (last > 0 && tonnage > last) ? 15 : 0;
  const totalXP = baseXP + tonnageXP + exoXP + prXP + progressBonus;
  // Crédits: 10 base + xp/10 + 20 par PR
  const credits = 10 + Math.floor(totalXP / 10) + prsCount * 20;
  return {
    xp: totalXP,
    credits: credits,
    breakdown: { baseXP, tonnageXP, exoXP, prXP, progressBonus }
  };
}

// Retourne la liste des niveaux atteints entre oldLevel et newLevel
function levelsCrossed(oldXp, newXp) {
  const oldLvl = levelFromXp(oldXp);
  const newLvl = levelFromXp(newXp);
  const crossed = [];
  for (let l = oldLvl + 1; l <= newLvl; l++) crossed.push(l);
  return crossed;
}

function creditsForLevelUp(newLevel) {
  return 50 * newLevel;
}

  const xpIntoLevel = state.xp - xpToReachLevel(lvl);

  const pct = Math.min(100, Math.max(0, (xpIntoLevel / xpNeeded) * 100));
  bar.innerHTML = `
    <div class="profile-level">
      <div class="profile-level-label">LVL</div>
      <div class="profile-level-num">${lvl}</div>
    </div>
    <div class="profile-center">
      <div class="profile-title-row">
        <div class="profile-title">${title.emoji} ${title.name}</div>
        <div class="profile-xp-label">${xpIntoLevel} / ${xpNeeded} XP</div>
      </div>
      <div class="xp-bar"><div class="xp-fill" style="width: ${pct}%"></div></div>
    </div>
    <div class="profile-credits" id="profileCredits">
      <span class="profile-credits-icon">🪙</span>
      <span>${state.credits || 0}</span>
    </div>
  `;
}
