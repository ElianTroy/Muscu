// ================== TAB NAVIGATION ==================
let currentView = 'train';
function switchView(view) {
  if (view === currentView) return;
  currentView = view;
  document.querySelectorAll('.view').forEach(v => {
    v.classList.toggle('active', v.dataset.view === view);
  });
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  vibrate(15);
  // Lazy render
  if (view === 'stats') renderStats();
  if (view === 'trophies') renderTrophies();
  if (view === 'shop') renderShop();
  // Scroll top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ================== STATS VIEW ==================
function renderStats() {
  const root = document.getElementById('statsContent');
  if (!root) return;

  const totalSessions = state.totalSessions || 0;
  const totalTonnage = state.totalTonnage || 0;
  const totalDuration = state.totalDuration || 0;
  const totalPRs = state.totalPRs || 0;
  const avgDuration = totalSessions > 0 ? totalDuration / totalSessions : 0;
  const avgTonnage = totalSessions > 0 ? Math.round(totalTonnage / totalSessions) : 0;
  const creditsEarned = state.creditsEarned || 0;
  const creditsSpent = state.creditsSpent || 0;

  if (totalSessions === 0) {
    root.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📊</div>
        <div>Aucune séance validée pour le moment.<br>Valide ta première séance pour voir tes stats !</div>
      </div>`;
    return;
  }

  // Day breakdown
  const sessionsByDay = [0, 0, 0, 0, 0];
  const tonnageByDay = [0, 0, 0, 0, 0];
  (state.sessionHistory || []).forEach(h => {
    if (h.day >= 1 && h.day <= 4) {
      sessionsByDay[h.day]++;
      tonnageByDay[h.day] += (h.tonnage || 0);
    }
  });
  const maxSessions = Math.max(...sessionsByDay.slice(1), 1);
  const dayColors = ['', '#ff5555', '#5b8cff', '#4ade80', '#fbbf24'];

  let dayBreakdownHtml = '<div class="day-breakdown">';
  for (let d = 1; d <= 4; d++) {
    const pct = (sessionsByDay[d] / maxSessions) * 100;
    dayBreakdownHtml += `
      <div class="day-breakdown-row">
        <div class="dbr-num" style="background: linear-gradient(135deg, ${dayColors[d]}, ${dayColors[d]}cc); color: white;">J${d}</div>
        <div class="dbr-info">
          <div class="dbr-name">${WORKOUT[d].name}</div>
          <div class="dbr-meta">${tonnageByDay[d].toLocaleString('fr-FR')} kg cumulé</div>
        </div>
        <div class="dbr-bar-wrap"><div class="dbr-bar" style="width: ${pct}%; background: ${dayColors[d]}; color: ${dayColors[d]};"></div></div>
        <div class="dbr-count" style="color: ${dayColors[d]};">${sessionsByDay[d]}</div>
      </div>`;
  }
  dayBreakdownHtml += '</div>';

  // Top 5 exos by PR
  const topByPR = Object.entries(state.prs || {})
    .map(([id, weight]) => {
      const info = getExoById(id);
      return info ? { name: info.exo.name, weight, day: info.day } : null;
    })
    .filter(x => x !== null)
    .sort((a, b) => b.weight - a.weight)
    .slice(0, 5);

  let topHtml = '';
  if (topByPR.length > 0) {
    topHtml = '<div class="top-exos">';
    topByPR.forEach((t, i) => {
      topHtml += `
        <div class="top-exo-row">
          <div class="top-exo-rank">#${i + 1}</div>
          <div class="top-exo-name">${t.name}</div>
          <div class="top-exo-val"><b>${t.weight}</b> kg</div>
        </div>`;
    });
    topHtml += '</div>';
  }

  // Session progression chart (last 10)
  const last10 = (state.sessionHistory || []).slice(-10);
  let chartHtml = '';
  if (last10.length >= 2) {
    const tonnages = last10.map(s => s.tonnage || 0);
    const min = Math.min(...tonnages);
    const max = Math.max(...tonnages);
    const range = max - min || 1;
    const W = 300, H = 80, P = 6;
    const xs = last10.map((_, i) => P + (i * (W - 2*P)) / (last10.length - 1));
    const ys = last10.map(s => P + (1 - ((s.tonnage - min) / range)) * (H - 2*P));
    let path = `M ${xs[0]} ${ys[0]}`;
    for (let i = 1; i < xs.length; i++) path += ` L ${xs[i]} ${ys[i]}`;
    const fillPath = path + ` L ${xs[xs.length - 1]} ${H} L ${xs[0]} ${H} Z`;
    const pts = xs.map((x, i) => `<circle cx="${x}" cy="${ys[i]}" r="3" fill="#a78bfa"/>`).join('');
    chartHtml = `
      <div class="day-breakdown" style="padding: 14px 10px;">
        <svg viewBox="0 0 ${W} ${H}" style="width: 100%; height: 100px; display: block;" preserveAspectRatio="none">
          <defs>
            <linearGradient id="chartGradStat" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#7c4dff" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="chartLineStat" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#5b8cff"/>
              <stop offset="100%" stop-color="#7c4dff"/>
            </linearGradient>
          </defs>
          <path d="${fillPath}" fill="url(#chartGradStat)"/>
          <path d="${path}" fill="none" stroke="url(#chartLineStat)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          ${pts}
        </svg>
        <div style="text-align:center; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 4px;">
          ${last10.length} dernières séances · min ${min.toLocaleString('fr-FR')} · max ${max.toLocaleString('fr-FR')} kg
        </div>
      </div>`;
  }

  root.innerHTML = `
    <div class="stats-hero">
      <div class="stats-hero-label">TONNAGE TOTAL</div>
      <div class="stats-hero-value">${totalTonnage.toLocaleString('fr-FR')}<span class="stats-hero-unit">kg</span></div>
    </div>

    <div class="stats-grid">
      <div class="stat-card" style="--stat-color: #ff5555;">
        <div class="stat-card-label">Séances</div>
        <div class="stat-card-value">${totalSessions}</div>
        <div class="stat-card-sub">total</div>
      </div>
      <div class="stat-card" style="--stat-color: #5b8cff;">
        <div class="stat-card-label">Durée cumulée</div>
        <div class="stat-card-value">${formatDurationShort(totalDuration)}</div>
        <div class="stat-card-sub">~${formatDurationShort(avgDuration)}/séance</div>
      </div>
      <div class="stat-card" style="--stat-color: #fbbf24;">
        <div class="stat-card-label">Records perso</div>
        <div class="stat-card-value">${totalPRs}</div>
        <div class="stat-card-sub">PR battus</div>
      </div>
      <div class="stat-card" style="--stat-color: #4ade80;">
        <div class="stat-card-label">Tonnage moyen</div>
        <div class="stat-card-value">${avgTonnage.toLocaleString('fr-FR')}<span class="stat-card-unit">kg</span></div>
        <div class="stat-card-sub">par séance</div>
      </div>
      <div class="stat-card" style="--stat-color: #a78bfa;">
        <div class="stat-card-label">XP total</div>
        <div class="stat-card-value">${(state.xp || 0).toLocaleString('fr-FR')}</div>
        <div class="stat-card-sub">niveau ${state.level || 1}</div>
      </div>
      <div class="stat-card" style="--stat-color: #fbbf24;">
        <div class="stat-card-label">Crédits</div>
        <div class="stat-card-value">${(state.credits || 0).toLocaleString('fr-FR')}</div>
        <div class="stat-card-sub">${creditsEarned.toLocaleString('fr-FR')} gagnés · ${creditsSpent.toLocaleString('fr-FR')} dépensés</div>
      </div>
    </div>

    <div class="stats-section-title">Répartition par jour</div>
    ${dayBreakdownHtml}

    ${last10.length >= 2 ? `<div class="stats-section-title">Évolution du tonnage</div>${chartHtml}` : ''}

    ${topByPR.length > 0 ? `<div class="stats-section-title">Top records</div>${topHtml}` : ''}
  `;
}

function formatDurationShort(ms) {
  if (!ms || ms <= 0) return '—';
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h >= 100) return `${h}h`;
  if (h > 0) return `${h}h${String(m).padStart(2, '0')}`;
  return `${m}min`;
}

    ${renderCat('Thèmes', SHOP_THEMES, 'ownedThemes', 'theme', 'theme')}

    ${renderCat('Avatars', SHOP_AVATARS, 'ownedAvatars', 'avatar', 'avatar')}

function buyItem(kind, id) {
  let list, ownedKey;
  if (kind === 'theme')  { list = SHOP_THEMES;  ownedKey = 'ownedThemes'; }
  if (kind === 'sound')  { list = SHOP_SOUNDS;  ownedKey = 'ownedSounds'; }
  if (kind === 'avatar') { list = SHOP_AVATARS; ownedKey = 'ownedAvatars'; }
  if (!list) return;
  const item = list.find(x => x.id === id);
  if (!item) return;
  if ((state.credits || 0) < item.cost) {
    showToast('Pas assez de crédits');
    return;
  }
  customConfirm(`Acheter ${item.name} ?`, `Ça te coûtera 🪙 ${item.cost} crédits.`).then(ok => {
    if (!ok) return;
    state.credits -= item.cost;
    state.creditsSpent = (state.creditsSpent || 0) + item.cost;
    if (!state[ownedKey].includes(id)) state[ownedKey].push(id);
    // Auto-équipe après achat
    equipItem(kind, id, true);
    saveState();
    playBuySound();
    vibrate([30, 50, 30]);
    showToast(`${item.name} débloqué !`);
    checkAllBadges();
    renderProfileBar();
    renderShop();
  });
}

function equipItem(kind, id, silent) {
  if (kind === 'theme')  { state.theme = id; applyTheme(); }
  if (kind === 'sound')  { state.timerSound = id; playTimerSound(); }
  if (kind === 'avatar') { state.avatar = id; }
  saveState();
  if (!silent) {
    playClickSound();
    renderShop();
    if (kind === 'avatar') renderProfileBar();
  }
}

function applyTheme() {
  document.body.dataset.theme = state.theme || 'default';
  // Update theme-color meta
  const meta = document.querySelector('meta[name="theme-color"]');
  const colors = { default: '#0a0618', fire: '#1a0808', matrix: '#041a10', gold: '#1a1200', neon: '#1a0818', ice: '#041220' };
  if (meta) meta.setAttribute('content', colors[state.theme] || '#0a0618');
}

// ================== SOUND EFFECTS ==================
let _audioCtx = null;
function audioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtx;
}

function playTone(freq, duration, volume, type, delay) {
  const ctx = audioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = type || 'sine';
    const t0 = ctx.currentTime + (delay || 0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(volume || 0.3, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
    osc.start(t0);
    osc.stop(t0 + duration + 0.05);
  } catch(e) {}
}

function playClickSound() { playTone(600, 0.07, 0.15, 'triangle'); }
function playCheckSound() {
  playTone(700, 0.1, 0.25, 'sine');
  playTone(1000, 0.12, 0.2, 'sine', 0.06);
}
function playBuySound() {
  playTone(600, 0.08, 0.2, 'sine');
  playTone(900, 0.08, 0.2, 'sine', 0.1);
  playTone(1200, 0.15, 0.2, 'sine', 0.2);
}
function playPRSound() {
  // Fanfare rapide
  [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.18, 0.25, 'triangle', i * 0.1));
}
function playLevelUpSound() {
  // Montée plus grandiose
  const notes = [392, 523, 659, 784, 1047, 1319];
  notes.forEach((f, i) => playTone(f, 0.2, 0.28, 'triangle', i * 0.08));
  playTone(1047, 0.4, 0.25, 'sine', notes.length * 0.08);
}
function playBadgeSound() {
  playTone(880, 0.1, 0.25, 'sine');
  playTone(1175, 0.12, 0.25, 'sine', 0.08);
  playTone(1568, 0.25, 0.3, 'sine', 0.18);
}

// Son de fin de chrono selon le choix
function playTimerSound() {
  const sound = state.timerSound || 'classic';
  if (sound === 'classic') {
    [0, 0.15, 0.3].forEach(d => playTone(880, 0.2, 0.3, 'sine', d));
  } else if (sound === 'bell') {
    playTone(523, 0.8, 0.4, 'sine');
    playTone(1047, 0.6, 0.3, 'sine', 0.05);
    playTone(1568, 0.4, 0.2, 'sine', 0.1);
  } else if (sound === 'arcade') {
    [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.1, 0.3, 'square', i * 0.08));
  } else if (sound === 'horn') {
    playTone(220, 0.4, 0.35, 'sawtooth');
    playTone(330, 0.5, 0.3, 'sawtooth', 0.1);
    playTone(440, 0.6, 0.25, 'sawtooth', 0.2);
  } else if (sound === 'zen') {
    playTone(880, 1.2, 0.2, 'sine');
    playTone(1320, 1.0, 0.15, 'sine', 0.3);
    playTone(1760, 0.8, 0.1, 'sine', 0.6);
  }
}

// Bip pour les 3 dernières secondes
function playCountdownTick() { playTone(1000, 0.08, 0.18, 'triangle'); }

let _confirmResolver = null;
function customConfirm(title, body) {
  return new Promise(resolve => {
    _confirmResolver = resolve;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmBody').textContent = body;
    document.getElementById('confirmOverlay').classList.add('active');
  });
}
function resolveConfirm(ok) {
  document.getElementById('confirmOverlay').classList.remove('active');
  if (_confirmResolver) { _confirmResolver(ok); _confirmResolver = null; }
}

// ================== UNLOCK OVERLAY (niveau/badge) ==================
const _unlockQueue = [];
let _unlockShowing = false;
function queueUnlock(kind, icon, title, subtitle, reward) {
  _unlockQueue.push({ kind, icon, title, subtitle, reward });
  if (!_unlockShowing) showNextUnlock();
}
function showNextUnlock() {
  if (_unlockQueue.length === 0) { _unlockShowing = false; return; }
  _unlockShowing = true;
  const u = _unlockQueue.shift();
  document.getElementById('unlockIcon').textContent = u.icon;
  document.getElementById('unlockKind').textContent = u.kind;
  document.getElementById('unlockTitle').textContent = u.title;
  document.getElementById('unlockSubtitle').textContent = u.subtitle || '';
  document.getElementById('unlockReward').textContent = u.reward || '';
  document.getElementById('unlockOverlay').classList.add('active');
  if (u.kind.includes('BADGE')) playBadgeSound();
  else playLevelUpSound();
  vibrate([100, 50, 100, 50, 200]);
}
function closeUnlock() {
  document.getElementById('unlockOverlay').classList.remove('active');
  setTimeout(showNextUnlock, 300);
}

// ================== CHECK & UNLOCK BADGES ==================
function checkAllBadges() {
  const newBadges = [];
  BADGES.forEach(b => {
    if (!isBadgeUnlocked(b) && checkBadgeUnlock(b)) {
      state.badges[b.id] = Date.now();
      newBadges.push(b);
    }
  });
  if (newBadges.length > 0) {
    saveState();
    // Bonus crédits : +20 par badge
    const bonus = newBadges.length * 20;
    state.credits = (state.credits || 0) + bonus;
    state.creditsEarned = (state.creditsEarned || 0) + bonus;
    saveState();
    newBadges.forEach(b => {
      queueUnlock('BADGE DÉBLOQUÉ', b.emoji, b.name, b.desc, '+20 🪙');
    });
    renderProfileBar();
  }
  return newBadges;
}

// ================== COUNTDOWN BEEP ON LAST 3 SECONDS ==================
let _lastCountdownSecond = null;
const _originalUpdateTimer = updateTimerDisplay;
updateTimerDisplay = function() {
  _originalUpdateTimer();
  const remainingMs = Math.max(0, timerEndsAt - Date.now());
  const remainingSec = Math.ceil(remainingMs / 1000);
  if (remainingSec > 0 && remainingSec <= 3 && remainingSec !== _lastCountdownSecond) {
    _lastCountdownSecond = remainingSec;
    playCountdownTick();
  }
  if (remainingSec === 0) _lastCountdownSecond = null;
};

// Override playBeep to use configured sound
const _originalPlayBeep = playBeep;
playBeep = function() {
  playTimerSound();
};

// ================== MODIFY closeRecap TO AWARD XP/CREDITS ==================
// On hook closeRecap en sauvegardant l'ancien
const _originalCloseRecap = closeRecap;
closeRecap = function(validate) {
  if (validate && pendingRecapDay) {
    const d = pendingRecapDay;
    const tonnage = computeTonnage(d);
    // Compter exos done
    const exosDone = WORKOUT[d].sections.reduce((s, sec) =>
      s + sec.exercises.filter(e => state.done[e.id]).length, 0);
    // Compter nouveaux PRs (ceux qui vont être enregistrés)
    let newPrsCount = 0;
    WORKOUT[d].sections.forEach(sec => {
      sec.exercises.forEach(ex => {
        if (!state.done[ex.id]) return;
        const w = state.weights[ex.id] !== undefined ? state.weights[ex.id] : ex.weight;
        if (w > (state.prs[ex.id] || 0) && ex.weight !== 0) newPrsCount++;
      });
    });
    // Duration
    const rawStart = state.sessionStart[d];
    const effectiveStart = rawStart && rawStart > APP_OPENED_AT ? rawStart : APP_OPENED_AT;
    const duration = rawStart ? (Date.now() - effectiveStart) : 0;
    // Compute rewards
    const rewards = computeSessionRewards(d, tonnage, exosDone, newPrsCount);
    const oldXp = state.xp || 0;
    const newXp = oldXp + rewards.xp;
    const crossed = levelsCrossed(oldXp, newXp);
    // Appliquer XP
    state.xp = newXp;
    state.level = levelFromXp(newXp);
    // Crédits de séance
    state.credits = (state.credits || 0) + rewards.credits;
    state.creditsEarned = (state.creditsEarned || 0) + rewards.credits;
    // Bonus de montée de niveau
    let levelBonus = 0;
    crossed.forEach(lvl => {
      const c = creditsForLevelUp(lvl);
      levelBonus += c;
    });
    if (levelBonus > 0) {
      state.credits += levelBonus;
      state.creditsEarned += levelBonus;
    }
    // Stats cumulées
    state.totalSessions = (state.totalSessions || 0) + 1;
    state.totalTonnage = (state.totalTonnage || 0) + tonnage;
    state.totalDuration = (state.totalDuration || 0) + duration;
    state.totalPRs = (state.totalPRs || 0) + newPrsCount;
    // Session history
    if (!Array.isArray(state.sessionHistory)) state.sessionHistory = [];
    state.sessionHistory.push({
      date: Date.now(),
      day: d,
      duration: duration,
      tonnage: tonnage,
      xp: rewards.xp,
      credits: rewards.credits + levelBonus,
      prs: newPrsCount
    });
    if (state.sessionHistory.length > 200) state.sessionHistory = state.sessionHistory.slice(-200);

    saveState();

    // Appel de l'original (gère history, PRs, reset done, reshuffle, counters)
    _originalCloseRecap(validate);

    // UI updates
    renderProfileBar();
    bumpCredits();

    // Vérifier badges
    const newBadges = checkAllBadges();

    // Level up overlays
    crossed.forEach(lvl => {
      const title = currentTitle(lvl);
      const c = creditsForLevelUp(lvl);
      queueUnlock('NIVEAU DÉBLOQUÉ', '⭐', `Niveau ${lvl}`, `${title.emoji} ${title.name}`, `+${c} 🪙`);
    });
  } else {
    _originalCloseRecap(validate);
  }
};

// Override showSessionRecap to add XP/credit/levelup display
const _originalShowSessionRecap = showSessionRecap;
showSessionRecap = function(day) {
  _originalShowSessionRecap(day);
  // Preview XP/crédits gagnés si on valide
  const tonnage = computeTonnage(day);
  const exosDone = WORKOUT[day].sections.reduce((s, sec) =>
    s + sec.exercises.filter(e => state.done[e.id]).length, 0);
  let newPrsCount = 0;
  WORKOUT[day].sections.forEach(sec => {
    sec.exercises.forEach(ex => {
      if (!state.done[ex.id]) return;
      const w = state.weights[ex.id] !== undefined ? state.weights[ex.id] : ex.weight;
      if (w > (state.prs[ex.id] || 0) && ex.weight !== 0) newPrsCount++;
    });
  });
  const rewards = computeSessionRewards(day, tonnage, exosDone, newPrsCount);
  // Simuler level up
  const oldXp = state.xp || 0;
  const newXp = oldXp + rewards.xp;
  const crossed = levelsCrossed(oldXp, newXp);
  let levelBonus = 0;
  crossed.forEach(lvl => { levelBonus += creditsForLevelUp(lvl); });
  // Afficher rewards
  const rewEl = document.getElementById('recapRewards');
  if (rewEl) {
    rewEl.style.display = 'flex';
    rewEl.innerHTML = `
      <div class="recap-reward-chip xp">
        <span class="recap-reward-icon">⭐</span>+${rewards.xp} XP
      </div>
      <div class="recap-reward-chip credit">
        <span class="recap-reward-icon">🪙</span>+${rewards.credits + levelBonus}
      </div>
    `;
  }
  // Afficher level up preview
  const lvEl = document.getElementById('recapLevelup');
  if (lvEl) {
    if (crossed.length > 0) {
      const newLvl = crossed[crossed.length - 1];
      const newTitle = currentTitle(newLvl);
      lvEl.style.display = 'block';
      lvEl.innerHTML = `🎉 NIVEAU ${newLvl} ATTEINT<small>${newTitle.emoji} ${newTitle.name} · +${levelBonus} 🪙 bonus</small>`;
    } else {
      lvEl.style.display = 'none';
    }
  }
  // Jouer son PR si PR détecté
  setTimeout(() => { if (newPrsCount > 0) playPRSound(); }, 1500);
};

// ================== BIND NAV ==================
function bindNav() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });
}

// ================== INITIAL PROGRESSION BACKFILL ==================
// Pour les users existants (v2 sans XP), on ne backfille pas d'XP pour ne pas
// gonfler le niveau artificiellement. On laisse seulement totalSessions déjà migré.
function initProgressionIntegrity() {
  // Sécurité : recalculer level depuis xp si désynchro
  const computed = levelFromXp(state.xp || 0);
  if (state.level !== computed) {
    state.level = computed;
    saveState();
  }
}


setLogoImage();
applyTheme();
initProgressionIntegrity();
renderProfileBar();
renderCounters();
renderDays();
bindNav();
restoreTimer();
requestNotifPermission(); // prompt soon after load

document.body.style.overscrollBehavior = 'contain';

</script>
