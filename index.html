<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Muscu Elian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0a;
  --bg-2: #141414;
  --bg-3: #1c1c1c;
  --bg-4: #242424;
  --border: #2a2a2a;
  --text: #f5f5f5;
  --text-dim: #888;
  --text-faint: #555;
  --accent-1: #ff3b3b;
  --accent-2: #3b9dff;
  --accent-3: #4ade80;
  --accent-4: #fbbf24;
  --warmup: #a78bfa;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body {
  background: 
    radial-gradient(circle at 20% 0%, rgba(255,59,59,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(59,157,255,0.05) 0%, transparent 50%),
    var(--bg);
  padding-bottom: 120px;
}

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(10,10,10,0.85);
  border-bottom: 1px solid var(--border);
  padding: 16px 18px 14px;
}
.logo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 4px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-dot {
  width: 10px; height: 10px;
  background: var(--accent-1);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.2); }
}

.counters {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.counter {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 6px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.counter::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
}
.counter[data-day="1"] { --accent: var(--accent-1); }
.counter[data-day="2"] { --accent: var(--accent-2); }
.counter[data-day="3"] { --accent: var(--accent-3); }
.counter[data-day="4"] { --accent: var(--accent-4); }

.counter-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.counter-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.counter-btn {
  width: 22px; height: 22px;
  border: 1px solid var(--border);
  background: var(--bg-3);
  color: var(--text);
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.counter-btn:active {
  transform: scale(0.9);
  background: var(--accent);
  border-color: var(--accent);
}
.counter-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  min-width: 24px;
  color: var(--accent);
  display: inline-block;
}

.counter-value.pop {
  animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn {
  0% { transform: scale(1); }
  30% { transform: scale(1.7); }
  60% { transform: scale(0.85); }
  100% { transform: scale(1); }
}

.plus-one {
  position: absolute;
  top: 6px;
  right: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: var(--accent);
  pointer-events: none;
  animation: flashUp 0.9s ease-out forwards;
}
@keyframes flashUp {
  0% { opacity: 0; transform: translateY(8px) scale(0.5); }
  30% { opacity: 1; transform: translateY(0) scale(1.1); }
  100% { opacity: 0; transform: translateY(-22px) scale(1.3); }
}

.days-container {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.day {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  transition: all 0.3s;
}
.day[data-day="1"] { --accent: var(--accent-1); }
.day[data-day="2"] { --accent: var(--accent-2); }
.day[data-day="3"] { --accent: var(--accent-3); }
.day[data-day="4"] { --accent: var(--accent-4); }

.day.open {
  border-color: var(--accent);
  box-shadow: 0 0 40px -10px var(--accent);
}

.day-header {
  padding: 18px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.day-title {
  display: flex;
  align-items: center;
  gap: 14px;
}
.day-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  color: var(--accent);
  line-height: 0.85;
  letter-spacing: 2px;
}
.day-info h2 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.day-info p {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.day-chevron {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.day.open .day-chevron {
  background: var(--accent);
  border-color: var(--accent);
  transform: rotate(180deg);
}
.day-chevron svg { width: 14px; height: 14px; }

.day-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.day.open .day-body {
  max-height: 20000px;
}

.day-body-inner {
  padding: 0 16px 20px;
}

.day-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  padding: 12px;
  background: var(--bg-3);
  border-radius: 12px;
}
.toolbar-btn {
  flex: 1;
  padding: 10px;
  background: var(--bg-4);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
}
.toolbar-btn:active { transform: scale(0.97); }
.toolbar-btn.reset { color: #ff6b6b; }
.toolbar-btn.progress { color: var(--accent); border-color: var(--accent); }

.progress-bar {
  height: 4px;
  background: var(--bg-4);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 16px;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s;
  border-radius: 2px;
}

.section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin: 18px 4px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::before {
  content: '';
  width: 14px; height: 2px;
  background: var(--accent);
}

.exercise {
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
  transition: all 0.3s;
}
.exercise.done {
  opacity: 0.4;
  background: var(--bg-2);
}
.exercise.done .ex-image-wrap {
  filter: grayscale(1);
}

.ex-top {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}
.ex-image-wrap {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--bg-4), var(--bg-2));
  border: 1px solid var(--accent);
  border-radius: 12px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: inset 0 0 30px -10px var(--accent);
}
.ex-emoji {
  font-size: 40px;
  line-height: 1;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
}

.ex-header {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-width: 0;
}
.ex-num-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.ex-check {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-left: auto;
  transition: all 0.2s;
  flex-shrink: 0;
}
.exercise.done .ex-check {
  background: var(--accent);
  border-color: var(--accent);
}
.ex-check svg {
  width: 14px; height: 14px;
  opacity: 0;
  transition: opacity 0.2s;
}
.exercise.done .ex-check svg { opacity: 1; }

.ex-name {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 4px;
}
.ex-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
.ex-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}
.ex-meta b {
  color: var(--text);
  font-weight: 600;
}

.ex-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.ctrl-group {
  background: var(--bg-4);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
}
.ctrl-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.weight-input-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
}
.weight-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1px;
  width: 100%;
  padding: 0;
  outline: none;
  min-width: 0;
}
.weight-input:focus {
  color: var(--accent);
}
.weight-unit {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
}

.feel-select {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 2px 0;
  outline: none;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
}
.feel-select option { background: var(--bg-3); }

.timer-btn {
  width: 100%;
  padding: 10px;
  background: var(--bg-4);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s;
}
.timer-btn:active { transform: scale(0.98); }
.timer-btn svg { width: 14px; height: 14px; }

.cardio {
  background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
  border: 1px dashed var(--warmup);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.cardio.end { border-color: var(--accent); }
.cardio-icon {
  width: 50px; height: 50px;
  background: var(--bg-4);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 26px;
}
.cardio-info h4 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 3px;
}
.cardio-info p {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  line-height: 1.5;
}

.timer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(10px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 30px;
}
.timer-overlay.active { display: flex; }
.timer-ring {
  width: 240px;
  height: 240px;
  position: relative;
}
.timer-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.timer-ring circle {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
}
.timer-ring .bg-circle { stroke: var(--bg-3); }
.timer-ring .fg-circle {
  stroke: var(--accent-1);
  stroke-dasharray: 691;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear;
}
.timer-time {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px;
  letter-spacing: 2px;
}
.timer-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  padding: 0 20px;
}
.timer-actions {
  display: flex;
  gap: 12px;
}
.timer-action {
  padding: 14px 28px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
}
.timer-action.stop { background: var(--accent-1); border-color: var(--accent-1); }

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-3);
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 12px 20px;
  border-radius: 30px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  z-index: 500;
  opacity: 0;
  transition: all 0.3s;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.exercise, .cardio {
  animation: slideIn 0.4s ease-out;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.footer {
  text-align: center;
  padding: 30px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 2px;
}

.weight-input::-webkit-outer-spin-button,
.weight-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.weight-input[type=number] { -moz-appearance: textfield; }

@media (max-width: 360px) {
  .counter-value { font-size: 18px; }
  .counter-btn { width: 20px; height: 20px; font-size: 12px; }
  .day-num { font-size: 30px; }
  .ex-image-wrap { width: 60px; height: 60px; }
  .ex-emoji { font-size: 32px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo-row">
    <div class="logo">
      <span class="logo-dot"></span>
      MUSCU ELIAN
    </div>
  </div>
  <div class="counters" id="counters"></div>
</header>

<main class="days-container" id="days"></main>

<footer class="footer">
  Rien que ça pousse 🧌
</footer>

<div class="timer-overlay" id="timerOverlay">
  <div class="timer-label" id="timerLabel">Repos</div>
  <div class="timer-ring">
    <svg viewBox="0 0 240 240">
      <circle class="bg-circle" cx="120" cy="120" r="110"/>
      <circle class="fg-circle" id="timerCircle" cx="120" cy="120" r="110"/>
    </svg>
    <div class="timer-time" id="timerTime">00:00</div>
  </div>
  <div class="timer-actions">
    <button class="timer-action" onclick="addTime(15)">+15s</button>
    <button class="timer-action stop" onclick="stopTimer()">Stop</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMOJI = {
  chestPress: "🏋️",
  inclinePress: "📐",
  pecDeck: "🦋",
  dips: "⬇️",
  ropeExtension: "🪢",
  barExtension: "🏋️‍♂️",
  latPulldown: "🔽",
  seatedRow: "🚣",
  unilateralRow: "💪",
  straightArm: "⬇️",
  curlMachine: "💪",
  inclineDumbbell: "🏋️‍♀️",
  hammerCurl: "🔨",
  wristCurl: "✊",
  legPress: "🦵",
  legExtension: "🦿",
  legCurl: "🦵",
  calfRaise: "👟",
  shoulderPress: "🔝",
  lateralRaise: "↔️",
  reversePec: "🔙",
  cableLateral: "✨",
  crunch: "🔥",
  legRaise: "⬆️",
  obliques: "🌀"
};

const SVG = {
  chevron: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  reset: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>'
};

const WORKOUT = {
  1: {
    name: "Pecs + Triceps",
    warmup: {
      title: "Échauffement",
      duration: "5 min",
      details: "Tapis · 6 → 6,5 km/h · inclinaison 3-4%<br>+ rotations épaules/bras 30 sec"
    },
    sections: [
      {
        title: "Pectoraux",
        exercises: [
          { id: "d1e1", name: "Chest Press", icon: "chestPress", sets: "4 × 8-10", rest: "90 sec", weight: 32 },
          { id: "d1e2", name: "Développé incliné machine", icon: "inclinePress", sets: "3 × 10", rest: "90 sec", weight: 50 },
          { id: "d1e3", name: "Pec Deck", icon: "pecDeck", sets: "3 × 12-15", rest: "60 sec", weight: 52 },
          { id: "d1e4", name: "Dips assistés", icon: "dips", sets: "3 × 10-12", rest: "90 sec", weight: 27, weightLabel: "Assistance" }
        ]
      },
      {
        title: "Triceps",
        exercises: [
          { id: "d1e5", name: "Extension à la corde", icon: "ropeExtension", sets: "3 × 12", rest: "60 sec", weight: 20 },
          { id: "d1e6", name: "Extension barre poulie", icon: "barExtension", sets: "3 × 10", rest: "60 sec", weight: 20.3 }
        ]
      }
    ],
    cooldown: { title: "Fin de séance", duration: "10 min", details: "Tapis · 5,5-6 km/h · inclinaison 6-8%" }
  },
  2: {
    name: "Dos + Biceps + Avant-bras",
    warmup: {
      title: "Échauffement",
      duration: "5 min",
      details: "Tapis · 6 → 6,5 km/h · inclinaison 3%<br>+ rotations bras/épaules 30 sec"
    },
    sections: [
      {
        title: "Dos",
        exercises: [

const STORAGE_KEY = 'muscu_elian_v1';
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    counters: { 1: 0, 2: 0, 3: 0, 4: 0 },
    weights: {},
    feelings: {},
    done: {},
    openDay: null
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function renderCounters() {
  const c = document.getElementById('counters');
  c.innerHTML = '';
  for (let d = 1; d <= 4; d++) {
    const el = document.createElement('div');
    el.className = 'counter';
    el.dataset.day = d;
    el.innerHTML = `
      <div class="counter-label">J${d}</div>
      <div class="counter-controls">
        <button class="counter-btn" onclick="changeCounter(${d}, -1)">−</button>
        <span class="counter-value" id="cv-${d}">${state.counters[d] || 0}</span>
        <button class="counter-btn" onclick="changeCounter(${d}, 1)">+</button>
      </div>
    `;
    c.appendChild(el);
  }
}

function changeCounter(day, delta) {
  state.counters[day] = Math.max(0, (state.counters[day] || 0) + delta);
  saveState();
  
  const valueEl = document.getElementById(`cv-${day}`);
  const counterEl = document.querySelector(`.counter[data-day="${day}"]`);
  if (valueEl) {
    valueEl.textContent = state.counters[day];
    valueEl.classList.remove('pop');
    void valueEl.offsetWidth;
    valueEl.classList.add('pop');
  }
  if (delta > 0 && counterEl) {
    const plusOne = document.createElement('span');
    plusOne.className = 'plus-one';
    plusOne.textContent = '+1';
    counterEl.appendChild(plusOne);
    setTimeout(() => plusOne.remove(), 900);
  }
  vibrate(20);
}

function renderDays() {
  const container = document.getElementById('days');
  container.innerHTML = '';
  for (let d = 1; d <= 4; d++) {
    const day = WORKOUT[d];
    const dayEl = document.createElement('article');
    dayEl.className = 'day';
    dayEl.dataset.day = d;
    if (state.openDay === d) dayEl.classList.add('open');
    
    const header = document.createElement('div');
    header.className = 'day-header';
    header.innerHTML = `
      <div class="day-title">
        <div class="day-num">J${d}</div>
        <div class="day-info">
          <h2>${day.name}</h2>
          <p>≈ 60 min</p>
        </div>
      </div>
      <div class="day-chevron">${SVG.chevron}</div>
    `;
    header.onclick = () => toggleDay(d);
    dayEl.appendChild(header);
    
    const body = document.createElement('div');
    body.className = 'day-body';
    const inner = document.createElement('div');
    inner.className = 'day-body-inner';
    
    const toolbar = document.createElement('div');
    toolbar.className = 'day-toolbar';
    toolbar.innerHTML = `
      <button class="toolbar-btn reset" onclick="resetDay(${d})">${SVG.reset} Reset</button>
      <div class="toolbar-btn progress" id="prog-${d}">0 / 0 fait</div>
    `;
    inner.appendChild(toolbar);
    
    const progBar = document.createElement('div');
    progBar.className = 'progress-bar';
    progBar.innerHTML = `<div class="progress-fill" id="progfill-${d}" style="width: 0%"></div>`;
    inner.appendChild(progBar);
    
    inner.appendChild(renderCardio(day.warmup, false));
    
    day.sections.forEach(section => {
      const secTitle = document.createElement('div');
      secTitle.className = 'section-title';
      secTitle.textContent = section.title;
      inner.appendChild(secTitle);
      
      section.exercises.forEach((ex) => {
        inner.appendChild(renderExercise(ex, d));
      });
    });
    
    inner.appendChild(renderCardio(day.cooldown, true));
    
    body.appendChild(inner);
    dayEl.appendChild(body);
    container.appendChild(dayEl);
  }
  updateAllProgress();
}

function renderCardio(data, isEnd) {
  const el = document.createElement('div');
  el.className = 'cardio' + (isEnd ? ' end' : '');
  const emoji = isEnd ? '🏃‍♂️' : '🔥';
  el.innerHTML = `
    <div class="cardio-icon">${emoji}</div>
    <div class="cardio-info">
      <h4>${data.title} · ${data.duration}</h4>
      <p>${data.details}</p>
    </div>
  `;
  return el;
}

function renderExercise(ex, day) {
  const el = document.createElement('div');
  el.className = 'exercise';
  el.id = ex.id;
  if (state.done[ex.id]) el.classList.add('done');
  
  const currentWeight = state.weights[ex.id] !== undefined ? state.weights[ex.id] : ex.weight;
  const currentFeel = state.feelings[ex.id] || '';
  const weightLabel = ex.weightLabel || 'Poids';
  const emoji = EMOJI[ex.icon] || '💪';
  const showUnit = ex.weight !== 0;
  
  el.innerHTML = `
    <div class="ex-top">
      <div class="ex-image-wrap">
        <span class="ex-emoji">${emoji}</span>
      </div>
      <div class="ex-header">
        <div class="ex-num-row">
          <div class="ex-check" onclick="toggleDone('${ex.id}', event)">${SVG.check}</div>
        </div>
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta">
          <span><b>${ex.sets}</b></span>
          <span>· pause <b>${ex.rest}</b></span>
        </div>
      </div>
    </div>
    <div class="ex-controls">
      <div class="ctrl-group">
        <div class="ctrl-label">${weightLabel}</div>
        <div class="weight-input-wrap">
          <input type="number" class="weight-input" value="${currentWeight}" 
            step="0.1" onchange="updateWeight('${ex.id}', this.value)" 
            onfocus="this.select()" inputmode="decimal">
          ${showUnit ? '<span class="weight-unit">kg</span>' : ''}
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Ressenti</div>
        <select class="feel-select" onchange="updateFeel('${ex.id}', this.value)">
          <option value="" ${currentFeel === '' ? 'selected' : ''}>—</option>
          <option value="easy" ${currentFeel === 'easy' ? 'selected' : ''}>↑ Trop facile</option>
          <option value="ok" ${currentFeel === 'ok' ? 'selected' : ''}>✓ Bon niveau</option>
          <option value="hard" ${currentFeel === 'hard' ? 'selected' : ''}>↓ Trop dur</option>
        </select>
      </div>
    </div>
    <button class="timer-btn" onclick="startTimer(${parseRest(ex.rest)}, '${ex.name.replace(/'/g, "\\'")}')">${SVG.clock} Lancer repos · ${ex.rest}</button>
  `;
  return el;
}

function parseRest(r) {
  const m = r.match(/\d+/);
  return m ? parseInt(m[0]) : 60;
}

function toggleDay(d) {
  state.openDay = state.openDay === d ? null : d;
  saveState();
  document.querySelectorAll('.day').forEach(el => {
    el.classList.toggle('open', parseInt(el.dataset.day) === state.openDay);
  });
  if (state.openDay === d) {
    setTimeout(() => {
      const el = document.querySelector(`.day[data-day="${d}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function toggleDone(id, ev) {
  ev.stopPropagation();
  state.done[id] = !state.done[id];
  saveState();
  const el = document.getElementById(id);
  el.classList.toggle('done', state.done[id]);
  if (state.done[id]) vibrate(30);
  updateAllProgress();
}

function updateWeight(id, val) {
  const num = parseFloat(val);
  if (!isNaN(num)) {
    state.weights[id] = num;
    saveState();
  }
}

function updateFeel(id, val) {
  state.feelings[id] = val;
  saveState();
}

function resetDay(d) {
  Object.keys(state.done).forEach(k => {
    if (k.startsWith(`d${d}e`)) delete state.done[k];
  });
  saveState();
  document.querySelectorAll(`[id^="d${d}e"]`).forEach(el => el.classList.remove('done'));
  updateAllProgress();
  showToast(`Jour ${d} réinitialisé`);
  vibrate(40);
}

function updateAllProgress() {
  for (let d = 1; d <= 4; d++) {
    const total = WORKOUT[d].sections.reduce((s, sec) => s + sec.exercises.length, 0);
    const done = Object.keys(state.done).filter(k => k.startsWith(`d${d}e`) && state.done[k]).length;
    const fill = document.getElementById(`progfill-${d}`);
    const prog = document.getElementById(`prog-${d}`);
    if (fill) fill.style.width = `${(done/total) * 100}%`;
    if (prog) prog.textContent = `${done} / ${total} fait${done > 1 ? 's' : ''}`;
  }
}

let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;

function startTimer(seconds, exName) {
  stopTimer();
  timerRemaining = seconds;
  timerTotal = seconds;
  document.getElementById('timerLabel').textContent = 'Repos · ' + exName;
  document.getElementById('timerOverlay').classList.add('active');
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      finishTimer();
    }
  }, 1000);
  vibrate(20);
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  document.getElementById('timerTime').textContent = 
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const circ = 691;
  const offset = circ - (timerRemaining / timerTotal) * circ;
  document.getElementById('timerCircle').style.strokeDashoffset = offset;
}

function addTime(sec) {
  timerRemaining += sec;
  timerTotal += sec;
  updateTimerDisplay();
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timerOverlay').classList.remove('active');
}

function finishTimer() {
  stopTimer();
  playBeep();
  vibrate([200, 100, 200, 100, 400]);
  showToast('Repos terminé — Go !');
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.2);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.2);
    });
  } catch(e) {}
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

renderCounters();
renderDays();

document.body.style.overscrollBehavior = 'contain';
</script>
