<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Muscu Elian</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1c;--bg4:#242424;
  --border:#2a2a2a;--text:#f5f5f5;--dim:#888;--faint:#444;
  --c1:#ff3b3b;--c2:#3b9dff;--c3:#4ade80;--c4:#fbbf24;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{padding-bottom:100px}

.hdr{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px 12px}
.logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;display:flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;background:var(--c1);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}
.sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:2px}

.cntrs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cntr{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 4px;text-align:center;position:relative;overflow:hidden}
.cntr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac)}
.cntr[data-d="1"]{--ac:var(--c1)}.cntr[data-d="2"]{--ac:var(--c2)}.cntr[data-d="3"]{--ac:var(--c3)}.cntr[data-d="4"]{--ac:var(--c4)}
.clbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:2px}
.crow{display:flex;align-items:center;justify-content:center;gap:6px}
.cbtn{width:22px;height:22px;border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cbtn:active{transform:scale(.9);background:var(--ac);border-color:var(--ac)}
.cval{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ac);min-width:24px}

.days{padding:14px;display:flex;flex-direction:column;gap:12px}
.day{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:border-color .3s,box-shadow .3s}
.day[data-d="1"]{--ac:var(--c1)}.day[data-d="2"]{--ac:var(--c2)}.day[data-d="3"]{--ac:var(--c3)}.day[data-d="4"]{--ac:var(--c4)}
.day.open{border-color:var(--ac);box-shadow:0 0 40px -10px var(--ac)}
.dhdr{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;-webkit-user-select:none}
.dtitle{display:flex;align-items:center;gap:12px}
.dnum{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--ac);line-height:.9;letter-spacing:2px}
.dinfo h2{font-size:14px;font-weight:700;margin-bottom:2px}
.dinfo p{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:1px}
.dchev{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
.day.open .dchev{background:var(--ac);border-color:var(--ac);transform:rotate(180deg)}
.dchev svg{width:14px;height:14px}
.dbody{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.day.open .dbody{max-height:30000px}
.dbinner{padding:0 14px 18px}

.toolbar{display:flex;gap:8px;margin-bottom:14px;padding:10px;background:var(--bg3);border-radius:12px}
.tbtn{flex:1;padding:9px;background:var(--bg4);border:1px solid var(--border);color:var(--text);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.tbtn:active{transform:scale(.97)}
.tbtn.rst{color:#ff6b6b}
.tbtn.prg{color:var(--ac);border-color:var(--ac)}
.progbar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:14px}
.progfill{height:100%;background:var(--ac);transition:width .4s;border-radius:2px}

.stitle{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin:16px 4px 10px;display:flex;align-items:center;gap:8px}
.stitle::before{content:'';width:14px;height:2px;background:var(--ac)}

.ex{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px;transition:all .3s}
.ex.done{opacity:.35;background:var(--bg2)}
.ex.done .eimg{filter:grayscale(1)}
.etop{display:flex;gap:10px;margin-bottom:10px}
.eimg{width:70px;height:70px;background:var(--bg4);border:1px solid var(--border);border-radius:10px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.eimg img{width:100%;height:100%;object-fit:cover;display:block}
.eimgfb{font-size:26px}
.ehdr{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.echeck{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:auto;margin-bottom:4px;flex-shrink:0;transition:all .2s}
.ex.done .echeck{background:var(--ac);border-color:var(--ac)}
.echeck svg{width:13px;height:13px;opacity:0;transition:opacity .2s}
.ex.done .echeck svg{opacity:1}
.ename{font-size:14px;font-weight:700;line-height:1.2;margin-bottom:4px}
.emeta{display:flex;gap:8px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)}
.emeta b{color:var(--text)}

.ectrl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cg{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:8px 10px}
.cglbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.wrow{display:flex;align-items:center;gap:4px}
.winp{flex:1;background:transparent;border:none;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;width:100%;padding:0;outline:none;min-width:0;-webkit-appearance:none}
.winp:focus{color:var(--ac)}
.winp::-webkit-outer-spin-button,.winp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.wunit{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim)}
.fsel{width:100%;background:transparent;border:none;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;padding:2px 0;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}
.fsel option{background:var(--bg3)}

.enotes{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);padding:8px 10px;background:var(--bg4);border-left:2px solid var(--ac);border-radius:6px;line-height:1.5;margin-bottom:8px}
.ealt{font-size:10px;color:var(--dim);font-style:italic;padding-left:10px;border-left:2px solid var(--faint);margin-bottom:8px;font-family:'JetBrains Mono',monospace}

.timerbtn{width:100%;padding:9px;background:var(--bg4);border:1px solid var(--border);color:var(--dim);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.timerbtn:active{transform:scale(.98);border-color:var(--ac);color:var(--ac)}
.timerbtn svg{width:13px;height:13px}

.cardio{background:var(--bg3);border:1px dashed #a78bfa;border-radius:14px;padding:12px;margin-bottom:10px;display:flex;gap:10px;align-items:center}
.cardio.end{border-color:var(--ac)}
.cico{width:46px;height:46px;background:var(--bg4);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.cinfoh{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;margin-bottom:3px}
.cinfop{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);line-height:1.5}

.tov{position:fixed;inset:0;background:rgba(0,0,0,.96);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.tov.on{display:flex}
.tring{width:230px;height:230px;position:relative}
.tring svg{width:100%;height:100%;transform:rotate(-90deg)}
.tring circle{fill:none;stroke-width:8;stroke-linecap:round}
.tbg{stroke:var(--bg3)}.tfg{stroke:var(--c1);stroke-dasharray:660;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
.ttime{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:60px;letter-spacing:2px}
.tlbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;text-align:center;max-width:240px}
.tbtns{display:flex;gap:10px}
.tbtn2{padding:12px 24px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:12px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer}
.tbtn2.stop{background:var(--c1);border-color:var(--c1)}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--c3);color:var(--text);padding:10px 18px;border-radius:30px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;z-index:500;opacity:0;transition:all .3s;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
footer{text-align:center;padding:28px 16px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);letter-spacing:2px}
footer b{color:var(--dim)}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo-row">
    <div class="logo"><span class="dot"></span>MUSCU ELIAN</div>
    <div class="sub">BASIC FIT &middot; 4-SPLIT</div>
  </div>
  <div class="cntrs" id="cntrs"></div>
</header>

<main class="days" id="days"></main>

<footer><b>Muscu Elian</b> &middot; Fait avec les muscles &#x1F4AA;</footer>

<div class="tov" id="tov">
  <div class="tlbl" id="tlbl">Repos</div>
  <div class="tring">
    <svg viewBox="0 0 230 230">
      <circle class="tbg" cx="115" cy="115" r="105"/>
      <circle class="tfg" id="tcirc" cx="115" cy="115" r="105"/>
    </svg>
    <div class="ttime" id="ttime">00:00</div>
  </div>
  <div class="tbtns">
    <button class="tbtn2" onclick="addTime(15)">+15s</button>
    <button class="tbtn2 stop" onclick="stopTimer()">Stop</button>
  </div>
</div>

<div class="toast" id="toast"></div>

};

// STORAGE
var SK = "muscu_elian_v2";
var state = (function(){
  try{var r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}
  return {counters:{1:0,2:0,3:0,4:0},weights:{},feelings:{},done:{},openDay:null};
})();

function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}

// COUNTERS
function renderCounters(){
  var el=document.getElementById("cntrs");
  el.innerHTML="";
  for(var d=1;d<=4;d++){
    var c=document.createElement("div");
    c.className="cntr";c.setAttribute("data-d",d);
    c.innerHTML='<div class="clbl">J'+d+'</div><div class="crow"><button class="cbtn" data-d="'+d+'" data-delta="-1">-</button><span class="cval" id="cv'+d+'">'+(state.counters[d]||0)+'</span><button class="cbtn" data-d="'+d+'" data-delta="1">+</button></div>';
    el.appendChild(c);
  }
  el.addEventListener("click",function(e){
    var btn=e.target.closest(".cbtn");
    if(!btn)return;
    var d=parseInt(btn.getAttribute("data-d"));
    var delta=parseInt(btn.getAttribute("data-delta"));
    state.counters[d]=Math.max(0,(state.counters[d]||0)+delta);
    save();
    document.getElementById("cv"+d).textContent=state.counters[d];
    vibrate(20);
  });
}

// DAYS
function renderDays(){
  var container=document.getElementById("days");
  container.innerHTML="";
  for(var d=1;d<=4;d++)container.appendChild(buildDay(d));
  updateAllProg();
}

function buildDay(d){
  var data=W[d];
  var art=document.createElement("article");
  art.className="day"+(state.openDay===d?" open":"");
  art.setAttribute("data-d",d);

  var hdr=document.createElement("div");
  hdr.className="dhdr";
  hdr.innerHTML='<div class="dtitle"><div class="dnum">J'+d+'</div><div class="dinfo"><h2>'+data.name+'</h2><p>~60 min</p></div></div><div class="dchev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>';
  hdr.setAttribute("data-d",d);
  art.appendChild(hdr);

  var body=document.createElement("div");
  body.className="dbody";
  var inner=document.createElement("div");
  inner.className="dbinner";

  var totalEx=0;
  for(var s=0;s<data.secs.length;s++)totalEx+=data.secs[s].ex.length;

  var tb=document.createElement("div");tb.className="toolbar";
  tb.innerHTML='<button class="tbtn rst" data-rst="'+d+'">&#x21BA; Reset</button><div class="tbtn prg" id="prog'+d+'">0 / '+totalEx+' faits</div>';
  inner.appendChild(tb);

  var pb=document.createElement("div");pb.className="progbar";
  pb.innerHTML='<div class="progfill" id="pf'+d+'" style="width:0%"></div>';
  inner.appendChild(pb);

  inner.appendChild(buildCardio(data.wu,false,d));
  for(var si=0;si<data.secs.length;si++){
    var sec=data.secs[si];
    var st=document.createElement("div");st.className="stitle";st.textContent=sec.t;
    inner.appendChild(st);
    for(var ei=0;ei<sec.ex.length;ei++)inner.appendChild(buildExo(sec.ex[ei],d));
  }
  inner.appendChild(buildCardio(data.cd,true,d));

  body.appendChild(inner);art.appendChild(body);
  return art;
}

function buildCardio(data,isEnd,d){
  var el=document.createElement("div");
  el.className="cardio"+(isEnd?" end":"");
  el.innerHTML='<div class="cico">'+(isEnd?"&#x1F3C3;":"&#x26A1;")+'</div><div><div class="cinfoh">'+data.t+' &middot; '+data.d+'</div><div class="cinfop">'+data.i+'</div></div>';
  return el;
}

function buildExo(ex,day){
  var el=document.createElement("div");
  el.className="ex"+(state.done[ex.id]?" done":"");
  el.id=ex.id;

  var curW=(state.weights[ex.id]!==undefined)?state.weights[ex.id]:ex.w;
  var curF=state.feelings[ex.id]||"";
  var wlbl=ex.wl||"Poids";

  // Image
  var imgWrap=document.createElement("div");imgWrap.className="eimg";
  var img=document.createElement("img");
  img.src=IMG[ex.ic]||"";img.alt=ex.n;img.loading="lazy";
  (function(wrap,icon){
    img.onerror=function(){wrap.innerHTML='<span class="eimgfb">'+(EMOJI[icon]||"💪")+'</span>';};
  })(imgWrap,ex.ic);
  imgWrap.appendChild(img);

  // Check
  var chk=document.createElement("div");chk.className="echeck";chk.setAttribute("data-id",ex.id);
  chk.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

  // Header
  var ehdr=document.createElement("div");ehdr.className="ehdr";
  ehdr.appendChild(chk);
  var en=document.createElement("div");en.className="ename";en.textContent=ex.n;ehdr.appendChild(en);
  var em=document.createElement("div");em.className="emeta";
  em.innerHTML='<b>'+ex.s+'</b>&nbsp;&middot;&nbsp;pause <b>'+ex.r+'s</b>';ehdr.appendChild(em);

  var top=document.createElement("div");top.className="etop";
  top.appendChild(imgWrap);top.appendChild(ehdr);el.appendChild(top);

  // Controls
  var ctrl=document.createElement("div");ctrl.className="ectrl";

  var wg=document.createElement("div");wg.className="cg";
  var winp=document.createElement("input");
  winp.type="number";winp.className="winp";winp.value=curW;winp.step="0.5";winp.inputMode="decimal";
  winp.setAttribute("data-id",ex.id);
  wg.innerHTML='<div class="cglbl">'+wlbl+'</div>';
  var wr=document.createElement("div");wr.className="wrow";
  wr.appendChild(winp);
  if(ex.w!==0){var wu=document.createElement("span");wu.className="wunit";wu.textContent="kg";wr.appendChild(wu);}
  wg.appendChild(wr);

  var fg=document.createElement("div");fg.className="cg";
  var fsel=document.createElement("select");fsel.className="fsel";fsel.setAttribute("data-id",ex.id);
  var fopts=[["","--"],["easy","Trop facile"],["ok","Bon niveau"],["hard","Trop dur"]];
  for(var i=0;i<fopts.length;i++){
    var opt=document.createElement("option");
    opt.value=fopts[i][0];opt.textContent=fopts[i][1];
    if(curF===fopts[i][0])opt.selected=true;
    fsel.appendChild(opt);
  }
  fg.innerHTML='<div class="cglbl">Ressenti</div>';fg.appendChild(fsel);

  ctrl.appendChild(wg);ctrl.appendChild(fg);el.appendChild(ctrl);

  if(ex.no){var nd=document.createElement("div");nd.className="enotes";nd.textContent=ex.no;el.appendChild(nd);}
  if(ex.alt){var ad=document.createElement("div");ad.className="ealt";ad.textContent=ex.alt;el.appendChild(ad);}

  var tb=document.createElement("button");tb.className="timerbtn";tb.setAttribute("data-sec",ex.r);tb.setAttribute("data-name",ex.n);
  tb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Lancer repos &middot; '+ex.r+'s';
  el.appendChild(tb);

  return el;
}

// EVENT DELEGATION
document.addEventListener("click",function(e){
  // Day toggle
  var dhdr=e.target.closest(".dhdr");
  if(dhdr){var d=parseInt(dhdr.getAttribute("data-d"));toggleDay(d);return;}

  // Check toggle
  var chk=e.target.closest(".echeck");
  if(chk){e.stopPropagation();toggleDone(chk.getAttribute("data-id"));return;}

  // Reset
  var rst=e.target.closest("[data-rst]");
  if(rst){resetDay(parseInt(rst.getAttribute("data-rst")));return;}

  // Timer
  var tb=e.target.closest(".timerbtn");
  if(tb){startTimer(parseInt(tb.getAttribute("data-sec")),tb.getAttribute("data-name"));return;}
});

document.addEventListener("change",function(e){
  if(e.target.classList.contains("winp")){
    var n=parseFloat(e.target.value);
    if(!isNaN(n)){state.weights[e.target.getAttribute("data-id")]=n;save();}
  }
  if(e.target.classList.contains("fsel")){
    state.feelings[e.target.getAttribute("data-id")]=e.target.value;save();
  }
});

function toggleDay(d){
  state.openDay=(state.openDay===d)?null:d;save();
  var all=document.querySelectorAll(".day");
  for(var i=0;i<all.length;i++){
    var dd=parseInt(all[i].getAttribute("data-d"));
    if(dd===state.openDay)all[i].classList.add("open");
    else all[i].classList.remove("open");
  }
  if(state.openDay===d){
    setTimeout(function(){
      var el=document.querySelector('.day[data-d="'+d+'"]');
      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
    },150);
  }
}

function toggleDone(id){
  state.done[id]=!state.done[id];save();
  var el=document.getElementById(id);
  if(el){if(state.done[id])el.classList.add("done");else el.classList.remove("done");}
  if(state.done[id])vibrate(30);
  updateAllProg();
}

function resetDay(d){
  if(!confirm("Remettre a zero le Jour "+d+" ?"))return;
  var prefix="d"+d+"e";
  var keys=Object.keys(state.done);
  for(var i=0;i<keys.length;i++)if(keys[i].indexOf(prefix)===0)delete state.done[keys[i]];
  save();
  var exos=document.querySelectorAll('[id^="'+prefix+'"]');
  for(var j=0;j<exos.length;j++)exos[j].classList.remove("done");
  updateAllProg();
  showToast("Jour "+d+" reinitialise");vibrate(40);
}

function updateAllProg(){
  for(var d=1;d<=4;d++){
    var data=W[d];var total=0;
    for(var s=0;s<data.secs.length;s++)total+=data.secs[s].ex.length;
    var done=0;var prefix="d"+d+"e";
    var keys=Object.keys(state.done);
    for(var k=0;k<keys.length;k++)if(keys[k].indexOf(prefix)===0&&state.done[keys[k]])done++;
    var pf=document.getElementById("pf"+d);var pg=document.getElementById("prog"+d);
    if(pf)pf.style.width=(total?(done/total*100):0)+"%";
    if(pg)pg.textContent=done+" / "+total+" faits";
  }
}

// TIMER
var tInt=null,tRem=0,tTot=0;
function startTimer(sec,name){
  stopTimer();tRem=sec;tTot=sec;
  document.getElementById("tlbl").textContent="Repos - "+name;
  document.getElementById("tov").classList.add("on");
  updTimer();
  tInt=setInterval(function(){tRem--;updTimer();if(tRem<=0)finishTimer();},1000);
  vibrate(20);
}
function updTimer(){
  var m=Math.floor(tRem/60),s=tRem%60;
  document.getElementById("ttime").textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
  var off=660-(tTot>0?(tRem/tTot)*660:0);
  document.getElementById("tcirc").style.strokeDashoffset=off;
}
function addTime(s){tRem+=s;tTot+=s;updTimer();}
function stopTimer(){if(tInt){clearInterval(tInt);tInt=null;}document.getElementById("tov").classList.remove("on");}
function finishTimer(){stopTimer();beep();vibrate([200,100,200,100,400]);showToast("Repos termine - Go !");}

function beep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.15,0.3].forEach(function(delay){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type="sine";
      g.gain.setValueAtTime(0,ctx.currentTime+delay);
      g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+delay+0.02);
      g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+delay+0.2);
      o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+0.25);
    });
  }catch(e){}
}

function vibrate(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}
var toastT=null;
function showToast(msg){
  var t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(function(){t.classList.remove("on");},2400);
}

document.body.style.overscrollBehavior="contain";
renderCounters();
renderDays();
</script>
</body>
</html>
